---
name: Set up Neovim with plugins
description: >-
  Neovim (0.11 系 pin) のセットアップと lazy.nvim プラグインの cache + restore。
  tests.yml と bench.yml の両方が使う共有 setup。pin・cache key・restore 手順を
  ここに一元化し、workflow 間の二重管理 (pin 更新漏れ等の drift) を防ぐ。
  利用側は actions/checkout 済みであること (ローカル action のため)。

runs:
  using: composite
  steps:
    # config は Neovim 0.11 系前提 (vim.lsp.config / vim.diagnostic.jump 等)。
    # Ubuntu apt の neovim は古い (0.9.5) ため公式リリースを別途セットアップする。
    # ⚠️ version は 0.11 系に pin する ("stable" にしない): stable が 0.12 に進んだ時点で、
    #   意図的に master 凍結している nvim-treesitter/textobjects (_nviminit.lua 参照) が
    #   0.12 の iter_matches 変更 (キャプチャがノード配列になる) と非互換になり、go の
    #   ]] motion が move.lua "attempt to call method 'range'" で死ぬことを 0.12.4 実測で
    #   確認 (2026-07-10 の CI 赤の真因)。nvim を 0.12 へ上げるときは treesitter main 系への
    #   移行とセットで行い、この pin も同時に更新すること。
    - name: Set up Neovim (0.11 系に pin)
      shell: bash
      env:
        NVIM_VERSION: v0.11.5
      run: |
        # 公式リリースを手動 DL する。rhysd/action-setup-vim はリトライ制御ができず、
        # GitHub リリース配信の一時 504 (Gateway Time-out) で CI が落ちる実例があった
        # (2026-07-24 の bench 赤)。actionlint (lint.yml) と同じ手動 DL + リトライ方針に揃える。
        # curl の -f は 404/504 の HTML を tarball として保存して後段の tar を
        # 「not in gzip format」で殺す分かりにくい失敗を防ぎ、--retry-all-errors で 504 も再試行する。
        url="https://github.com/neovim/neovim/releases/download/${NVIM_VERSION}/nvim-linux-x86_64.tar.gz"
        curl -fsSL --retry 5 --retry-all-errors -o "$RUNNER_TEMP/nvim.tar.gz" "$url"
        mkdir -p "$RUNNER_TEMP/nvim"
        tar xzf "$RUNNER_TEMP/nvim.tar.gz" -C "$RUNNER_TEMP/nvim" --strip-components=1
        echo "$RUNNER_TEMP/nvim/bin" >> "$GITHUB_PATH"

    # プラグイン (lazy.nvim 本体 + 各プラグイン) の clone を ~/.local/share/nvim/lazy ごと
    # キャッシュしてネットワーク依存と再 clone を抑える。次段の :Lazy! restore が
    # _lazy-lock.json の固定 commit へ同期する。spec/lock を変えたら鍵が変わるよう hash する。
    # key の v2 は salt: Tests が赤い間は cache が保存されず、古い restore-key の store
    # (中身の素性が追えない) を引き続けるため、CI 構成を変えた 2026-07-10 を境に世代を切った。
    - name: Cache Neovim plugins
      uses: actions/cache@v6
      with:
        path: ~/.local/share/nvim/lazy
        key: nvim-lazy-v2-${{ runner.os }}-${{ hashFiles('_nviminit.lua', '_lazy-lock.json') }}
        restore-keys: |
          nvim-lazy-v2-${{ runner.os }}-

    # プラグインを _lazy-lock.json 通りに事前インストールする。config の ftplugin は
    # nvim-treesitter-textobjects 等を require するため、テスト時に本体が load 済みである必要がある
    # (runtime の遅延 auto-install に頼ると ftplugin の require が間に合わず落ちる)。
    #
    # DOTFILES_TS_SKIP_ENSURE=1 (このステップと、呼び出し側の nvim 実行ステップの両方に設定):
    # CI は parser 未インストールのため、素の起動では ensure_installed が毎回 31 個の
    # 非同期 DL+コンパイルジョブを撒く。コンパイラの無いこの runner では永遠に完走せず、
    # 各テストの +qall! が in-flight ジョブを中途 kill する不安定要因にしかならない
    # (テストは parser 非依存に設計済み: go の挙動 assert は parser 不在なら skip)。
    # ジョブを撒くこと自体を止めて headless 実行を決定論化する (_nviminit.lua の
    # ensure_installed コメント参照)。
    - name: Install Neovim plugins (lazy restore)
      env:
        DOTFILES_TS_SKIP_ENSURE: "1"
      shell: bash
      run: nvim --headless -u _nviminit.lua "+Lazy! restore" +qa
