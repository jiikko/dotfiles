---
# src/glog (Go 製 git log ラッパ) の CI。lint + test の本体は再利用 workflow _go-project.yml に
# 一元化し、ここは paths filter (触れた変更のときだけ起動) と対象 dir の指定だけを持つ薄い caller。
# paths に _go-project.yml を含めるのは、共有本体を編集したときにも全プロジェクトの CI を走らせて
# 検証するため (含めないと本体変更が誰にも検証されない)。
# ⚠️ paths filter 付きの check を required check に登録しない (理由は _go-project.yml 参照)。
name: src/glog

on:
  push:
    branches: [master]
    paths:
      - 'src/glog/**'
      - .github/workflows/src_glog.yml
      - .github/workflows/_go-project.yml
  pull_request:
    paths:
      - 'src/glog/**'
      - .github/workflows/src_glog.yml
      - .github/workflows/_go-project.yml
  workflow_dispatch:  # GitHub UI からの手動再実行用

permissions:
  contents: read

# 同一 ref の連続 push では古い run を打ち切る (旧コミットの結果に価値が無いため)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    uses: ./.github/workflows/_go-project.yml
    with:
      dir: src/glog
