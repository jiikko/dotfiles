---
name: Lint

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  dotfiles-lint:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      # actions/checkout は内部で `git init` する。runner の git は init.defaultBranch 未設定のため
      # "Using 'master' ... will change to main in Git 3.0" hint をログに出す。先に設定して抑制する。
      - name: Silence git init.defaultBranch hint
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v7

      - name: Install lint dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends zsh shellcheck yamllint jq

      - name: Run lint suite
        run: make test-lint

  parallel-each-go-lint:
    runs-on: ubuntu-slim
    # First run builds golangci-lint from source (go run) and may fetch a
    # newer Go toolchain; both are cached by setup-go for later runs. Allow
    # headroom for that cold build.
    timeout-minutes: 15
    steps:
      - name: Silence git init.defaultBranch hint
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/parallel-each/go.mod
          cache-dependency-path: src/parallel-each/go.sum

      - name: Lint src/parallel-each (golangci-lint)
        run: make test-go-lint
