---
name: Lint

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:  # GitHub UI からの手動再実行 (flake 切り分け用)

permissions:
  contents: read

# 同一 ref の連続 push では古い run を打ち切る (旧コミットの結果に価値が無いため)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dotfiles-lint:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      # actions/checkout は内部で `git init` する。runner の git は init.defaultBranch 未設定のため
      # "Using 'master' ... will change to main in Git 3.0" hint をログに出す。先に設定して抑制する。
      - name: Silence git init.defaultBranch hint
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v7

      - name: Install lint dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          # ruby は test-ruby-syntax (Brewfile/_pryrc の ruby -c と _gemrc の YAML パース) 用
          sudo apt-get install -y --no-install-recommends zsh shellcheck yamllint jq ruby

      # actionlint は apt に無いため公式リリースバイナリを取得する (test-actionlint が使う。
      # shellcheck が PATH にあると run: ブロックのシェル検査も有効になる)
      - name: Install actionlint
        run: |
          ver=$(gh api repos/rhysd/actionlint/releases/latest --jq '.tag_name' | sed 's/^v//')
          curl -sSL -o "$RUNNER_TEMP/actionlint.tar.gz" \
            "https://github.com/rhysd/actionlint/releases/download/v${ver}/actionlint_${ver}_linux_amd64.tar.gz"
          mkdir -p "$RUNNER_TEMP/actionlint"
          tar xzf "$RUNNER_TEMP/actionlint.tar.gz" -C "$RUNNER_TEMP/actionlint" actionlint
          echo "$RUNNER_TEMP/actionlint" >> "$GITHUB_PATH"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run lint suite
        run: make test-lint

  go-lint:
    runs-on: ubuntu-slim
    # First run builds golangci-lint from source (go run) and may fetch a
    # newer Go toolchain; both are cached by setup-go for later runs. Allow
    # headroom for that cold build.
    timeout-minutes: 15
    steps:
      - name: Silence git init.defaultBranch hint
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: src/parallel-each/go.mod
          cache-dependency-path: |
            src/parallel-each/go.sum
            src/glog/go.sum

      # glog の go test はここではなく専用 workflow (src_glog.yml、paths filter 付き) で回す。
      # 全 push で走る lint.yml に置くと glog 非接触の push でもテストが回るため移設した (2026-07-17)。
      # cache-dependency-path の src/glog/go.sum は golangci-lint (make test-go-lint) が
      # glog も lint するため残している。
      - name: Lint Go projects (golangci-lint)
        run: make test-go-lint
