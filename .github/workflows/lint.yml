---
name: Lint

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  dotfiles-lint:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Install lint dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends zsh shellcheck yamllint jq

      - name: Run lint suite
        run: make test-lint
