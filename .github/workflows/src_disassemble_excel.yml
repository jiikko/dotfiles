---
# src/disassemble_excel (Go 製 Excel 分解ツール) の lint + go test 専用 workflow (2026-07-17)。
# それまでこのプロジェクトは Makefile が無く、テスト 6 ファイルを持ちながら CI からも
# root の make test-go からも漏れていた (死蔵)。Makefile 新設 + GO_PROJECT_DIRS 登録と併せて
# karabiner.yml / src_glog.yml と同じ paths filter パターンで CI 化。
# ⚠️ paths filter 付きの check を branch protection の required check に登録しないこと
#   (非接触 PR では run が生成されず check が永遠に pending になる)。
name: src/disassemble_excel

on:
  push:
    branches: [master]
    paths:
      - 'src/disassemble_excel/**'
      - .github/workflows/src_disassemble_excel.yml
  pull_request:
    paths:
      - 'src/disassemble_excel/**'
      - .github/workflows/src_disassemble_excel.yml
  workflow_dispatch: # GitHub UI からの手動再実行用

permissions:
  contents: read

# 同一 ref の連続 push では古い run を打ち切る (旧コミットの結果に価値が無いため)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # lint と test は独立 job: 並列実行 + 片方だけの再実行が可能
  lint:
    runs-on: ubuntu-slim
    # 初回は golangci-lint を go run でソースからビルドするため余裕を持たせる (以降は cache)
    timeout-minutes: 15
    steps:
      - name: Silence git init.defaultBranch hint
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: src/disassemble_excel/go.mod
          cache-dependency-path: src/disassemble_excel/go.sum

      - name: Lint
        run: make -C src/disassemble_excel lint

  test:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - name: Silence git init.defaultBranch hint
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: src/disassemble_excel/go.mod
          cache-dependency-path: src/disassemble_excel/go.sum

      - name: Test
        run: make -C src/disassemble_excel test
