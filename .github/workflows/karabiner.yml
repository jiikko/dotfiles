---
name: Karabiner Lint

# karabiner.json の complex modifications を karabiner_cli で「意味レベル」lint する。
# lint.yml (ubuntu) の test-json は jq による構文チェックのみで、未知キー・型違いなど
# Karabiner のルール仕様レベルの誤りは検出できない。その検証に必要な karabiner_cli は
# Karabiner-Elements 同梱の macOS 専用バイナリで Linux runner では動かせないため、
# 専用の macOS job として分離する。
# paths filter: 対象は mac/karabiner.json だけなのに毎 push で macOS runner (ubuntu の
# 10 倍課金) を起動していたため、関係するファイルの変更時だけ走らせる。Makefile は
# test-karabiner ターゲットの定義元、workflow 自身は job 定義の変更を拾う。
on:
  push:
    branches: [master]
    paths:
      - mac/karabiner.json
      - .github/workflows/karabiner.yml
      - Makefile
  pull_request:
    paths:
      - mac/karabiner.json
      - .github/workflows/karabiner.yml
      - Makefile
  # paths filter でスキップされた後に単発で回したい時の手動トリガ
  workflow_dispatch:

permissions:
  contents: read

# git init の hint 抑制 (init.defaultBranch)。env で注入する理由は _go-project.yml 参照。
env:
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main

# 同一 ref の連続 push では古い run を打ち切る (旧コミットの結果に価値が無いため)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  karabiner-lint:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      # karabiner_cli は単体配布が無く Karabiner-Elements に同梱される。cask で入れると
      # /Library/Application Support/org.pqrs/Karabiner-Elements/bin/karabiner_cli が
      # 配置される。--lint-complex-modifications は静的検証で driver/daemon の起動は不要。
      # runner にプリインストールされた aws/tap が Homebrew の tap-trust 警告 (##[warning]) を
      # 出す。本 workflow は aws/tap を使わないので install 前に untap して警告源を除く
      # (deprecated な HOMEBREW_NO_REQUIRE_TAP_TRUST は使わない)。|| true で未 tap 環境でも失敗させない。
      - name: Install Karabiner-Elements (provides karabiner_cli)
        run: |
          brew untap aws/tap || true
          brew install --cask karabiner-elements

      # make test-karabiner は karabiner_cli が見つからないと黙って skip する設計。
      # CI で「未インストール=未検証」を緑にしないよう、ここで存在を明示確認して
      # 入っていなければ fail-loud で落とす (cask install 失敗の早期検知)。
      - name: Verify karabiner_cli is available
        run: |
          cli="/Library/Application Support/org.pqrs/Karabiner-Elements/bin/karabiner_cli"
          if [ ! -x "$cli" ]; then
            echo "::error::karabiner_cli not found at $cli (cask install failed?)"
            exit 1
          fi
          "$cli" --version

      - name: Lint karabiner.json complex modifications
        run: make test-karabiner
