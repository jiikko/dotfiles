---
# src/git-popup (Go 製 git 操作 popup TUI) の CI。lint + test の本体は再利用 workflow
# _go-project.yml に一元化し、ここは paths filter (触れた変更のときだけ起動) と対象 dir の
# 指定だけを持つ薄い caller。paths に _go-project.yml を含めるのは、共有本体を編集したときにも
# 全プロジェクトの CI を走らせて検証するため (含めないと本体変更が誰にも検証されない)。
# ⚠️ paths filter 付きの check を required check に登録しない (理由は _go-project.yml 参照)。
name: src/git-popup

on:
  push:
    branches: [master]
    paths:
      - 'src/git-popup/**'
      - .github/workflows/src_git-popup.yml
      - .github/workflows/_go-project.yml
  pull_request:
    paths:
      - 'src/git-popup/**'
      - .github/workflows/src_git-popup.yml
      - .github/workflows/_go-project.yml
  workflow_dispatch:  # GitHub UI からの手動再実行用

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # job id はチェック名の識別子 (共有 workflow のため check 名が "<id> / lint" になり、全 caller で同一 id だと区別不能)。プロジェクト名にする。
  git-popup:
    uses: ./.github/workflows/_go-project.yml
    with:
      dir: src/git-popup
