---
name: Tests

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch: # GitHub UI からの手動再実行 (flake 切り分け用)

permissions:
  contents: read

# 同一 ref の連続 push では古い run を打ち切る (旧コミットの結果に価値が無いため)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dotfiles-tests:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      # actions/checkout は内部で `git init` する。runner の git は init.defaultBranch 未設定のため
      # "Using 'master' ... will change to main in Git 3.0" hint をログに出す。先に設定して抑制する。
      - name: Silence git init.defaultBranch hint
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v7

      - name: Install runtime dependencies (tmux, zsh, bats)
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tmux zsh make bats

      # Neovim 0.11 pin + plugin cache + lazy restore。pin の理由・cache key の世代管理は
      # action 側に集約 (bench.yml と共有。二重管理を防ぐため詳細はそちらだけに書く)
      - uses: ./.github/actions/setup-nvim

      - name: Run dotfiles test suite
        env:
          DOTFILES_TS_SKIP_ENSURE: "1"
        run: make test-runtime
