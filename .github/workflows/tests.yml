---
name: Tests

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  dotfiles-tests:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      # actions/checkout は内部で `git init` する。runner の git は init.defaultBranch 未設定のため
      # "Using 'master' ... will change to main in Git 3.0" hint をログに出す。先に設定して抑制する。
      - name: Silence git init.defaultBranch hint
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v7

      - name: Install runtime dependencies (tmux, zsh, bats)
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tmux zsh make bats

      # config は Neovim 0.11+ 前提 (vim.lsp.config / vim.diagnostic.jump / vim.version.ge 等)。
      # Ubuntu apt の neovim は古い (0.9.5) ため、公式 stable リリースを別途セットアップする。
      - name: Set up Neovim (stable)
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      # プラグイン (lazy.nvim 本体 + 各プラグイン) の clone を ~/.local/share/nvim/lazy ごと
      # キャッシュしてネットワーク依存と再 clone を抑える。次段の :Lazy! restore が
      # _lazy-lock.json の固定 commit へ同期する。spec/lock を変えたら鍵が変わるよう hash する。
      - name: Cache Neovim plugins
        uses: actions/cache@v6
        with:
          path: ~/.local/share/nvim/lazy
          key: nvim-lazy-${{ runner.os }}-${{ hashFiles('_nviminit.lua', '_lazy-lock.json') }}
          restore-keys: |
            nvim-lazy-${{ runner.os }}-

      # プラグインを _lazy-lock.json 通りに事前インストールする。config の ftplugin は
      # nvim-treesitter-textobjects 等を require するため、テスト時に本体が load 済みである必要がある
      # (runtime の遅延 auto-install に頼ると ftplugin の require が間に合わず落ちる)。
      - name: Install Neovim plugins (lazy restore)
        run: nvim --headless -u _nviminit.lua "+Lazy! restore" +qa

      - name: Run dotfiles test suite
        run: make test-runtime
