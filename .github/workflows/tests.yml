---
name: Tests

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:  # GitHub UI からの手動再実行 (flake 切り分け用)

permissions:
  contents: read

# 同一 ref の連続 push では古い run を打ち切る (旧コミットの結果に価値が無いため)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 実行時間短縮のため 2 グループに並列分割し、heavy はジョブ内でも xargs -P 並列
  # (Makefile の run_tests_parallel)。テスト増殖で heavy が 5.6 分に育った実測 (2026-07-20)
  # を受けての措置。
  # グループ定義 (どのディレクトリが heavy か) は Makefile 側に集約 (CI_HEAVY_TEST_DIRS)。
  # rest は除外方式なので新テストディレクトリは自動で rest 側で走る。
  dotfiles-tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          # heavy (av1ify/concat) は nvim テストを含まない (setup-nvim 省略)。
          # zsh テストのみなので apt も zsh/make だけに絞る (tmux/bats の ~60s を節約)
          - group: heavy
            make-target: test-discovered-heavy
            needs-nvim: false
            packages: zsh make
          - group: rest
            make-target: test-runtime-rest
            needs-nvim: true
            packages: tmux zsh make bats
    name: dotfiles-tests (${{ matrix.group }})
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      # actions/checkout は内部で `git init` する。runner の git は init.defaultBranch 未設定のため
      # "Using 'master' ... will change to main in Git 3.0" hint をログに出す。先に設定して抑制する。
      - name: Silence git init.defaultBranch hint
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v7

      - name: Install runtime dependencies (${{ matrix.packages }})
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ${{ matrix.packages }}

      # Neovim 0.11 pin + plugin cache + lazy restore。pin の理由・cache key の世代管理は
      # action 側に集約 (bench.yml と共有。二重管理を防ぐため詳細はそちらだけに書く)
      - uses: ./.github/actions/setup-nvim
        if: ${{ matrix.needs-nvim }}

      - name: Run dotfiles test suite (${{ matrix.group }})
        env:
          DOTFILES_TS_SKIP_ENSURE: "1"
        run: make ${{ matrix.make-target }}
