# vim: set filetype=tmux:
# ~/.tmux.conf
# ------------------------------
# シェルと端末の設定
set -g default-shell $SHELL
# set -g default-terminal "screen-256color"
set -g default-terminal "xterm-256color"

# スクロールバック（履歴）の行数
set -g history-limit 100000

# エスケープシーケンス判定時間を短縮して入力遅延を抑える
set -sg escape-time 5

# プレフィックスキーの設定（screenの "escape "^Tt" " に相当）
# デフォルトの C-b を解除して C-t に変更
unbind C-b
set -g prefix C-t
bind C-t send-prefix

# ステータスバー全体の設定（tmux-continuum の autosave に status 更新が必要）
set -g status on
set -g status-interval 60
set -g status-justify left
set -g status-style bg=colour235,fg=colour136

# ウィンドウ名は zsh の preexec で制御するため automatic-rename は無効化
set -g automatic-rename off
# シェルからのエスケープシーケンスによるリネームを許可
set -g allow-rename on


# 左側：ホスト名とセッション名を Powerline 風に表示
set -g status-left-length 50
set -g status-left "#[fg=colour51,bold]#[bg=colour51,fg=colour235] #S #[fg=colour51]"


# 右側：非表示（tmux-continuum の hook 用に最小限の長さは確保）
set -g status-right-length 1
set -g status-right ""

# ウィンドウリストの表示設定
setw -g window-status-format "#[fg=colour244] #I:#W "
setw -g window-status-current-format "#[bg=colour31,fg=colour231] #I:#W #[default]"

# メッセージ表示時間（ミリ秒指定：1秒＝1000ms）
set -g display-time 2000
# オートデタッチ（detach-on-destroyはデフォルト true だが明示）
set -g detach-on-destroy on

# altscreen相当（tmuxではalternate-screenはデフォルト有効）
set -g alternate-screen on

# マウス操作有効化（スクロールやペイン選択）
set -g mouse off

# Vim風ペイン移動のキーバインド
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# クリップボード系(enterでコピー)
set-window-option -g mode-keys vi

# Alt+[でコピーモードに入る（Prefixなし）
bind-key -n M-[ copy-mode

bind-key -T copy-mode    y send-keys -X copy-pipe "pbcopy"
bind-key -T copy-mode-vi Space send-keys -X begin-selection
bind-key -T copy-mode-vi y     send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe "pbcopy"
# マウスで範囲選択した時に
bind   -T copy-mode-vi MouseDrag1Pane send-keys -X begin-selection
unbind -T copy-mode MouseDragEnd1Pane
unbind -T copy-mode-vi MouseDragEnd1Pane

# backspaceでウィンドウを戻る
bind-key BSpace previous-window
# spaceでウィンドウを進む
bind-key Space next-window

# Ctrlを押しっぱなしでもよいように
bind C-c new-window
bind c new-window
bind C-n next-window
bind C-p previous-window

# 再読み込みをキーバインドしておく
bind R source-file ~/.tmux.conf \; display-message "Reload Config!!"

# ペイン分割のキーバインド
# screen の "split -v"（垂直分割＝左右に分割）に相当
bind v split-window -h
bind \| split-window -h
# screen の "split"（水平分割＝上下に分割）に相当
bind s split-window -v
bind - split-window -v

# ペイン削除・一括削除のキーバインド
# 現在のペインを閉じる
bind x kill-pane
# 現在以外の全ペインを閉じる（screen の "only" に相当）
bind q kill-pane -a

# Prefixなしでウィンドウ移動 (Alt + n/p)
bind -n M-p previous-window
bind -n M-n next-window

# Prefixなしでペインを移動（端でループしない）
bind -n M-l if-shell -F '#{pane_at_left}' 'select-pane -L'
bind -n M-j if-shell -F '#{pane_at_bottom}' 'select-pane -D'
bind -n M-k if-shell -F '#{pane_at_top}' 'select-pane -U'
bind -n M-h if-shell -F '#{pane_at_right}' 'select-pane -R'

# ------------------------------
# tmux plugins (vendored)
#
# - 手動インストールなしで動くように、リポジトリ内にベンダーしたプラグインを読み込む
# - DOTFILES_DIR があればそれを優先、なければ $HOME/dotfiles を参照する
set -g @continuum-restore 'on'

# ペイン内容（スクロールバック）も保存・復元する
set -g @resurrect-capture-pane-contents 'on'

# 自動復元の進行状態を示すフラグを立てる/降ろすフック。
# - pre-restore-all : まず完了状態(@tt-restore-complete / @tt-restore-duration)を
#   unset してクリアし、次に @tt-restore-in-progress=<開始epoch> を立てる。
#   完了フラグのクリアを pre で明示的に行うのは「pre でクリア → post でセット」の
#   不変条件を保つため。これが無いと前回復元の @tt-restore-complete=1 が残った状態で
#   _tt_wait_for_restore が今回の post を待たず即 rc=0 になり、復元途中 attach や
#   古い @tt-restore-duration の flash を招く（tt 側は -n 判定なので 0 代入では不可、
#   unset/空が必要）。現状は新規サーバ起動でオプションが消えるため再起動跨ぎでは
#   起きにくいが、live サーバで wait を再入する経路が増えた場合に備えて明示する。
# - post-restore-all: 復元完了時に所要時間を計算 → @tt-restore-duration に格納 +
#   ~/.cache/tt-restore-duration.log に追記し、@tt-restore-in-progress=0 を経て
#   最後に @tt-restore-complete=1 を立てる。
# @tt-restore-complete は tt() がこのフラグが立つまで待ってから attach するため、
# 復元途中での attach（部分復元）やサーバ巻き込み kill を避けられる。
# @tt-restore-in-progress は下の window hook による debounce 保存が「復元中の
# 部分状態を last に焼き付けない」ためのガード（scripts/tmux_resurrect_debounced_save.sh）。
# 値を epoch にするのは、(a) 復元途中クラッシュで post-restore-all が走らずフラグが
# 降り損ねても保存側が TTL 超過で「降り損ね」と判定して保存を再開できるように、かつ
# (b) post 側が「完了時刻 - 開始epoch」で復元所要秒を算出できるようにするため。
# @tt-restore-duration は tt()（_tt_impl）が attach 時にステータスラインへ
# 「復元: Ns」と flash するために読む。flash を tt 側で出すのは、本フックの発火時点
# では tt がまだ attach しておらず display-message の表示先クライアントが無いため。
# post の set 順序は重要: @tt-restore-duration を必ず先に、@tt-restore-complete=1 を
# 最後に立てる（tt が complete を見た時点で duration が確定している保証）。ログ書き込み
# 失敗（{ } 2>/dev/null）はフラグ確定を妨げない（後続の set-option は ; で必ず走る）。
# （execute_hook は eval で実行するので $(date +%s) 等は発火時に評価される）
set -g @resurrect-hook-pre-restore-all 'tmux set-option -gu @tt-restore-complete; tmux set-option -gu @tt-restore-duration; tmux set-option -g @tt-restore-in-progress $(date +%s)'
set -g @resurrect-hook-post-restore-all 'tt_s=$(tmux show -gqv @tt-restore-in-progress); tt_d=$(( $(date +%s) - ${tt_s:-0} )); tmux set-option -g @tt-restore-duration "$tt_d"; { mkdir -p "$HOME/.cache" && printf "%s\trestore=%ss\n" "$(date +%FT%T)" "$tt_d" >> "$HOME/.cache/tt-restore-duration.log"; } 2>/dev/null; tmux set-option -g @tt-restore-in-progress 0; tmux set-option -g @tt-restore-complete 1'

# window の作成/削除を契機に resurrect 保存を debounce して走らせる。
# continuum の周期 autosave（15分）だけだと、最後の保存以降に増やした window が
# 再起動で失われる（snapshot staleness）。window-linked / window-unlinked から
# debounce 保存を呼び、損失窓を秒オーダーに縮める。
# 復元中（@tt-restore-in-progress）/ bootstrap hold 存在中は保存しないガードと、
# 多重起動 lock・debounce token はスクリプト側に集約（同ファイル冒頭コメント参照）。
set-hook -g window-linked   'run-shell -b "${DOTFILES_DIR:-$HOME/dotfiles}/scripts/tmux_resurrect_debounced_save.sh"'
set-hook -g window-unlinked 'run-shell -b "${DOTFILES_DIR:-$HOME/dotfiles}/scripts/tmux_resurrect_debounced_save.sh"'

# NOTE: tmux-continuum は tmux-resurrect に依存するため順序を守る
run-shell 'f="${DOTFILES_DIR:-$HOME/dotfiles}/vendor/tmux-plugins/tmux-resurrect/resurrect.tmux"; [ -f "$f" ] && bash "$f"'
run-shell 'f="${DOTFILES_DIR:-$HOME/dotfiles}/vendor/tmux-plugins/tmux-continuum/continuum.tmux"; [ -f "$f" ] && bash "$f"'
