# vim: set filetype=tmux:
# ~/.tmux.conf
# ------------------------------
# シェルと端末の設定
set -g default-shell $SHELL
# tmux 内の TERM は tmux 用 terminfo を使う。外側端末の機能 (RGB/clipboard 等) は
# terminal-features で別途 tmux に伝える
set -g default-terminal "tmux-256color"

# 外側ターミナルが対応する機能を tmux に明示する。
# - RGB: true color
# - clipboard: OSC 52 clipboard
# - extkeys: CSI u / modifyOtherKeys
# - focus: focus reporting
# - title: window title
# 実際の $TERM に合わせて必要ならパターンを追加する
set -as terminal-features ",xterm*:RGB,clipboard,extkeys,focus,title"
set -as terminal-features ",tmux*:RGB"

# スクロールバック（履歴）の行数
# スクロールバックは全ペインが RAM 常駐 (tmux に disk へ退避するオプションは無い。
# あっても 1 行 append ごとに disk I/O が走り遅くなるため tmux はやらない設計)。
# 100000 はサーバ RSS の ~74% を占めて過剰だったため抑える (tail/docker logs 等の
# 垂れ流しペインが上限まで埋まると 1 ペインで数十 MB になる)。
# ⚠️ この値は「新規 window にのみ適用」される (man tmux: "applies only to new
#    windows - existing window histories are not resized")。既存ペインへの反映は
#    tmux サーバ再起動か clear-history (prefix + M-c, 下部) が必要
set -g history-limit 30000

# エスケープシーケンス判定時間を短縮して入力遅延を抑える
set -sg escape-time 5

# 拡張キー (CSI u / modifyOtherKeys) をアプリへ中継する。Shift+Enter や
# Ctrl+Shift+x のような修飾キー組合せが tmux 内のアプリ (Claude Code 等) に届く。
# 'on' は「対応ターミナル + 要求したアプリ」のときだけ有効化されるので安全
set -s extended-keys on

# ペイン内アプリ (nvim の OSC52 yank 等) からシステムクリップボードへの書き込みを許可。
# ローカル個人 tmux 前提なら便利。SSH 先や共有セッションで信頼できないプロセスを
# 動かす場合は 'external' に戻す
set -s set-clipboard on

# tmux コマンドプロンプト (prefix + :) の履歴をサーバ再起動を跨いで保存
set -s history-file ~/.tmux_history

# window / pane の番号を 1 始まりにする（キーボードの 1 が一番左に対応）
set -g base-index 1
setw -g pane-base-index 1
# window を閉じても番号を詰めない (歯抜けを許容。番号が変わると場所の記憶が狂うため)
set -g renumber-windows off
# フォーカス変化を通知（vim の autoread / gitgutter 等が tmux 内で正しく動く）
set -g focus-events on

# プレフィックスキーの設定（screenの "escape "^Tt" " に相当）
# デフォルトの C-b を解除して C-t に変更
unbind C-b
set -g prefix C-t
# prefix+C-t は以前 send-prefix (生の C-t = fzf ファイル検索をシェルに素通し) だったが、
# fzf CTRL-T は未使用のため scratch トグルに転用 (2026-07-03)。Ctrl 押しっぱなしで
# t を 2 連打しても scratch が開閉できる (実体はスクラッチターミナル節の bind t / bind C-t)。
# 生の C-t をアプリに送りたくなったら send-prefix を別キーに割り当て直すこと。

# ステータスバー全体の設定（tmux-continuum の autosave に status 更新が必要）
set -g status on
# interval 1 は prefix 押下中の status-left 点滅 (status-left のコメント参照) の駆動用。
# 再描画はサーバ内の format 展開のみで fork ゼロ・CPU 負荷は無視できる (scratch で実績)
set -g status-interval 1
set -g status-justify left
# バー全体 (window list) は prefix を押しても配色不変 = 移動先が常に読める。
# prefix の可視化は status-left のセッション名島の蛍光点滅で行う (status-left のコメント参照)。
# 旧実装 2 案 (client_prefix で status-style ごとバー全体を発光 / 2 行目に発光行を常設) は
# 「window list が潰れる」「空行が常時居座る」でどちらも不採用 (ユーザー判断 2026-07-03)
set -g status-style 'bg=colour235,fg=colour136'

# ウィンドウ名 = アクティブペインのタイトル (pane_title) に自動追従させる。
# pane_title は zsh の preexec/precmd (zshlib/_tmux_window_name.zsh) が OSC 2 で
# ペイン単位にセットする。Claude Code や nvim も自身のタイトルを OSC でセットするので、
# どのペインがアクティブかでウィンドウ名が切り替わる (split で zsh に奪われない)
set -g automatic-rename on
set -g automatic-rename-format '#{pane_title}'
# \033k によるウィンドウ名直接リネームは禁止 (非アクティブペインの precmd が
# ウィンドウ名を奪う事故の元。タイトルは pane 単位の OSC 2 に一本化する)
set -g allow-rename off


# 左側：セッション名を Powerline 風に表示
set -g status-left-length 70
# セッション名の島は 2 つの状況でだけ点滅演出になる:
# 1) scratch セッション (prefix+t の nested tmux popup): マゼンタ(colour201)↔赤(colour196) の
#    毎秒反転 + スピナー ◐◓◑◒ の回転で「nested にいる」ことを強調。
# 2) 通常セッションで prefix (C-t) 押下中: 「⚡ PREFIX ARMED ⚡」バッジ (セッション名は非表示) +
#    マゼンタ(colour201)↔蛍光グリーン(colour46) の毎秒反転で「prefix が効いている」を可視化
#    (バー全体は発光させない。status-style のコメント参照)。
#    ⚠️ 島の幅は両状態で 20 セル固定 (window list が prefix 押下で左右にガタつかないため):
#      平常時 = 空白1 + #{p18:session_name} + 空白1 / prefix 時 = バッジ文字列 (⚡=2セル換算で 20)。
#      バッジ文言を変えるときは p18 の数値も同じ合計幅になるよう合わせること。
#    ※ #[blink] (SGR blink) は一度付けたが「点滅の消灯位相で文字が消え背景と同化して読めない」
#      ため外した (ユーザー判断 2026-07-03)。1 秒より速い色切替は status-interval の下限 1 秒の
#      ため tmux 自前では不可能で、毎秒の bg 反転が端末非依存の最速。
# - 点滅の仕組み (共通): 毎秒 bg 色を実際に切り替える。秒の取得は @secfmt='%S' を
#   #{T:@secfmt} で strftime 展開し、#{e|m:秒,2} (2相) / #{e|m:秒,4} (スピナー4フレーム) の
#   算術剰余で分岐する (T:/e| とも 3.5a の man に実在)。
#   旧実装の #(tmux_scratch_blink.sh) はシェルを毎秒 fork していたが、format 算術は
#   サーバ内で完結するため fork ゼロ (スクリプトは削除済み)。
#   ⚠️ #{T:%S} の直書きは不可 (T: は「オプション名」を取るため空になる)。@secfmt 経由が必須。
# - 駆動は global の status-interval=1 (ステータスバー全体の設定を参照)。
# - #[...] は単一属性で書きカンマを避ける (条件分岐内のカンマ未エスケープによるスタイル破損回避)。
#   非 prefix 側 (false 分岐) の既存スタイルはカンマを #, でエスケープしてある。
# - 末尾 (scratch 条件の外) は copy-mode 検索 HUD: 検索を始めた時だけ黄色地の「🔍 N」バッジが
#   出てヒット数が見える (search_present / search_count は 3.5a 実在。更新はステータス再描画
#   契機 = copy-mode のキー操作で追従)。置き場が status-right でないのは continuum 用に
#   空にする意図的設計のため (status-right のコメント参照)。
set -g @secfmt '%S'
set -g status-left "#{?#{==:#{session_name},scratch},#{?#{e|m:#{T:@secfmt},2},#[bg=colour201],#[bg=colour196]}#[fg=colour16]#[bold] ⚡ SCRATCH #{?#{==:#{e|m:#{T:@secfmt},4},0},◐,#{?#{==:#{e|m:#{T:@secfmt},4},1},◓,#{?#{==:#{e|m:#{T:@secfmt},4},2},◑,◒}}} (nested tmux) ⚡ #[default],#{?client_prefix,#{?#{e|m:#{T:@secfmt},2},#[bg=colour201],#[bg=colour46]}#[fg=colour16]#[bold] ⚡ PREFIX ARMED ⚡ #[default]#{?#{e|m:#{T:@secfmt},2},#[fg=colour201],#[fg=colour46]}#[default],#[fg=colour51#,bold]#[bg=colour51#,fg=colour235] #{p18:session_name} #[fg=colour51#,bg=colour235]#[default]}}#{?search_present,#[bg=colour226#,fg=colour16] 🔍 #{search_count} #[default],}"

# scratch 専用の演出 2 行目 (status 2 行化は popup 起動スクリプトが scratch セッションにだけ
# `set -t scratch status 2` で行う)。2 行目 = status-format[1] に毎秒更新の時計・パス・コマンドを
# Powerline 色島 (ピンク→シアン→黄) で並べる。通常セッションは status on (=1 行) のままなので
# この format は描画されず無害 (グローバル定義でも安全)。
# - status-format 行は strftime 展開されるため %H:%M:%S は直書きで動く (literal % は %% に)。
# - 毎秒更新は global の status-interval=1 で駆動される。
# - ${HOME} は conf 読込時に tmux が展開し、#{s|...|~|} でパスを ~ に短縮 (pane-border-format と
#   同型)。⚠️ ダブルクォート必須: シングルクォートだと ${HOME} が literal のまま option 値に入り、
#   `~` 短縮が効かない (加えて条件分岐内に置いた場合は literal な `}` が format を早期終端させ壊す)
set -g 'status-format[1]' "#[fg=colour16]#[bg=colour201]#[bold] %H:%M:%S #[fg=colour201]#[bg=colour51]#[fg=colour16]#[bg=colour51] #{s|${HOME}|~|:pane_current_path} #[fg=colour51]#[bg=colour226]#[fg=colour16]#[bg=colour226] #{pane_current_command} #[fg=colour226]#[bg=default]#[default]"


# NOTE: client-focus-in/out フックによるフォーカス喪失可視化 (「別アプリ」赤帯 +
# ボーダー消灯 + ステータスバー暗赤) は誤判定があり削除した (ユーザー判断 2026-06-10)。
# display-popup / display-menu を開くだけでも client-focus イベントが発火するため、
# kill 確認ダイアログ (bind x/q) の popup 化と相性が悪い。再導入する場合は
# popup 由来の focus イベントを除外できるかを先に検証すること


# 右側：非表示（tmux-continuum の hook 用に最小限の長さは確保）
set -g status-right-length 1
set -g status-right ""

# 非 current window の「放置フェード」: そのウィンドウの shell で最後にコマンドを
# 実行してからの経過時間で window 名の文字色を 3 段階に沈める。放置 window ほど
# バー地 (colour235) に溶け、アクティブな作業群が相対的に浮き上がる。
# - 経過時間の起点は #{window_activity} ではなく自前の @last-touched (window user option)。
#   window_activity は「出力活動」でも更新されるため (tail / Claude が動いているだけで若返る)
#   「触った」の意味に合わない。@last-touched は zsh の preexec/precmd
#   (zshlib/_tmux_window_name.zsh の _tmux_stamp_window_touched) がコマンド実行の
#   開始/完了時にスタンプする。⚠️ window の select (前面に出しただけ) はアクティブ判定に
#   **しない** (ユーザー要件 2026-07-04。当初 after-select-window hook で実装したが、
#   「見ただけで若返る」のは意味が違うため zsh 実行時スタンプに変更した。select 契機の
#   再導入提案は棄却してよい)。未スタンプ (server 起動後まだコマンド実行が無い window /
#   resurrect 復元直後) は通常色 = フェードなしに fallback。
# - 現在時刻は @secfmt (status-left) と同じ #{T:...} トリック: @epochfmt='%s' を
#   #{T:@epochfmt} で strftime 展開して epoch を得る (⚠️ #{T:%s} の直書きは不可)。
# - 段階: 30 分未満=colour244 (現状の非 current 色) / 30 分〜2 時間=colour240 /
#   2 時間以上=colour237 (バー地ギリギリ)。読めなくて困るなら 237→238 に上げる。
#   256 色パレット指定なので Terminal.app (truecolor 非対応) でもそのまま効く。
# - 追従はステータス再描画 (status-interval=60) 単位 = 分オーダー。段階が時間オーダー
#   なので十分。
# - #{E:@fade} で window-status-format から参照する (巨大 format 内に同じ 3 段分岐を
#   3 回複製しないための変数化。E: はオプション値を展開時の window 文脈で再展開する)。
set -g @epochfmt '%s'
set -g @fade '#{?@last-touched,#{?#{e|<:#{e|-:#{T:@epochfmt},#{@last-touched}},1800},#[fg=colour244],#{?#{e|<:#{e|-:#{T:@epochfmt},#{@last-touched}},7200},#[fg=colour240],#[fg=colour237]}},#[fg=colour244]}'

# ウィンドウリストの表示設定
# - #{=15:window_name} で表示を15文字に切り詰める (nvim のファイルパスや claude の
#   topic がウィンドウ名に入るため、上限なしだとステータスバーが溢れる)。
#   ウィンドウ名自体・ペイン境界の表示はフルのまま (表示側だけの切り詰め)
# - 先頭のアイコンは Claude Code の作業状態 (@claude_state)。⚙=作業中(黄) /
#   🔔=入力待ち(赤) / 🔕=既読(灰: 入力待ちを見たが未応答) / ✓=完了(緑)。
#   別ウィンドウの claude の状態をステータスバーで
#   一覧できる。#{P:...} でウィンドウ内の全ペインを展開するため、分割していても
#   claude ペイン全部のアイコンが並ぶ (例: 🔔✓ = 入力待ち + 完了)。
#   外側の #{?#{!=:...},} は「state を持つペインが 1 つも無ければ余白ごと出さない」判定
# - [N] はそのウィンドウのペイン分割数。分割していない (1 ペイン) なら表示しない
# - ペインを zoom 中 (prefix+z) は、そのウィンドウのセル背景を赤 (colour160) に反転して
#   強調する。判定は #{window_zoomed_flag} (tmux 2.x から有効なので版ガード不要。
#   pane-border-format 末尾の「🔍 ZOOM」表示=colour160 と色を揃え「ズーム=赤」を統一)。
#   current 側は明るい赤背景 (colour160)、非 current 側 (zoom したまま別 window へ
#   移った場合) は暗い赤背景 (colour52) にして「まだ zoom が残っている」ことを暗めに
#   知らせる。背景だけ反転し中の fg はそのまま使う (内部の #[fg=...] リセットと
#   干渉せずコントラストを保てる)。色は好みで変更可
# ※ window index % 6 でタブを虹色に色分けする「レインボー」を一度入れたが、実使用で
#   見にくく不採用 (ユーザー判断 2026-07-02)。非 current=colour244 グレー / current 島=colour31 青
#   の固定色に戻した。再提案が来ても「見にくいので不採用」で棄却してよい。
# - bell (非 current のみ): window_bell_flag でセルをオレンジ (208) 反転し「見るまで残る」。
#   window-status-bell-style 単体では既存 format の #[fg=..] 上書きに負けるため format 側で編む。
#   current で bell 条件が無いのは current window のベルは即クリアされ flag が立たないため。
# - style は #[単一属性] の連結で書き #, エスケープを避ける (status-left と同方針)
# - 非 current の文字色 (旧 #[fg=colour244] 固定) は放置フェード #{E:@fade} (上部定義) に
#   置換した。bell (fg=colour16) が最優先で fade より勝つのは従来どおり。zoom 済み非 current
#   (bg=colour52) にも fade が乗る: 2 時間放置 (colour237) だと暗赤背景とのコントラストが
#   落ちるが、zoom の残留は背景色が主担当なので許容 (気になるなら zoom 分岐だけ
#   #[fg=colour244] 固定に戻す)。claude アイコンの色 (⚙🔔🔕✓) は状態表示なので fade しない
setw -g window-status-format "#{?window_bell_flag,#[bg=colour208]#[fg=colour16],#{?window_zoomed_flag,#[bg=colour52]#{E:@fade},#{E:@fade}}} #I:#{?#{>:#{window_panes},1},#[fg=colour214][#{window_panes}]#{?window_bell_flag,#[fg=colour16],#{E:@fade}} ,}#{?#{!=:#{P:#{?@claude_state,x,}},},#{P:#{?@claude_state,#{?#{m:*working*,#{@claude_state}},#[fg=colour220]⚙,#{?#{m:*input*,#{@claude_state}},#[fg=colour203]🔔,#{?#{m:*seen*,#{@claude_state}},#[fg=colour244]🔕,#[fg=colour10]✓}}},}}#{?window_bell_flag,#[fg=colour16],#{E:@fade}} ,}#{=15:window_name} "
setw -g window-status-current-format "#{?window_zoomed_flag,#[fg=colour235]#[bg=colour160],#[fg=colour235]#[bg=colour31]}#{?window_zoomed_flag,#[bg=colour160]#[fg=colour231],#[bg=colour31]#[fg=colour231]} #I:#{?#{>:#{window_panes},1},#[fg=colour214][#{window_panes}]#[fg=colour231] ,}#{?#{!=:#{P:#{?@claude_state,x,}},},#{P:#{?@claude_state,#{?#{m:*working*,#{@claude_state}},#[fg=colour220]⚙,#{?#{m:*input*,#{@claude_state}},#[fg=colour203]🔔,#{?#{m:*seen*,#{@claude_state}},#[fg=colour250]🔕,#[fg=colour123]✓}}},}}#[fg=colour231] ,}#{=15:window_name} #{?window_zoomed_flag,#[fg=colour160]#[bg=colour235],#[fg=colour31]#[bg=colour235]}#[default]"
# 🔕=既読 (input を見たがまだ未応答)。window 選択時に tmux-mark-seen.sh が
# 🔔 input -> 🔕 seen に降格する (set-hook after-select-window, 下部参照)
# - window 間の仕切り (window-status-separator): デフォルトはスペース 1 個で、非 current
#   window 同士 (全て colour244 グレー) が溶けて「何個あるか / どこへジャンプできるか」が
#   読み取りにくかった (ユーザー要望 2026-07-03)。暗いグレー (colour238) の縦棒 │ を挟み
#   セル境界を明示する。太い赤縦棒 ┃ (colour196) + 前後スペースで分離感を強めている
#   (棒を細く/薄くしたいなら │ + fg=colour238 に戻す)。current 島 (colour31 背景) の両脇にも入るが背景色で
#   浮くため干渉しない。#[default] で棒の色を後続 format に持ち越さない。棒の文字/色は好みで変更可
set -g window-status-separator "#[fg=colour196] ┃ #[default]"

# メッセージ表示時間（ミリ秒指定：1秒＝1000ms）
set -g display-time 2000
# display-message / : プロンプトの劇的配色 (デフォルトは黄地黒字で地味)。
# - message-style: メッセージ表示 + : プロンプトの通常入力中 (マゼンタ×白 bold)
# - message-command-style: status-keys vi で Escape を押し vi command mode に入った時
#   だけ濃紺×シアンに切り替わる (= 入力モードが色で分かる 2 段演出)
set -g message-style 'bg=colour201,fg=colour231,bold'
set -g message-command-style 'bg=colour17,fg=colour51'

# bell 閃光システム: 別 window のコマンドが bell (\a) を鳴らすと
# (1) 画面下端に赤帯「🔔 BELL: <window名>」を 800ms 表示 (-N でキー入力でも消えない)、
# (2) window list の該当セルをオレンジ反転で残す (見るまで残る)。
# `sleep 300; printf '\a'` のような長時間コマンド完了通知が派手なイベントになる。
# - monitor-bell は 3.5a デフォルト on だが依存を明示するため書く
# - セルのオレンジ反転は window-status-format 側の #{?window_bell_flag,...} 条件が主担当
#   (bell-style 単体では既存 format の #[fg=...] 上書きに負けて bg しか効かないため)
# - alert-bell はサーバ内イベント hook なので、削除済み client-focus hook の
#   popup 誤発火問題 (上記 NOTE) とは無関係
setw -g monitor-bell on
set -g window-status-bell-style 'bg=colour208,fg=colour16'
set-hook -g alert-bell 'display-message -d 800 -N "🔔 BELL: #{window_name}"'
# オートデタッチ（detach-on-destroyはデフォルト true だが明示）
set -g detach-on-destroy on

# altscreen相当（tmuxではalternate-screenはデフォルト有効）
set -g alternate-screen on

# 外側ターミナル (iTerm 等) のウィンドウタイトルにもアクティブペインのタイトルを反映
set -g set-titles on
set -g set-titles-string "#{pane_title} — tmux:#S"

# マウス操作は無効（スクロール・ペイン選択はキーボード操作前提）
#
# 2026-06-13: 一度 mouse on にして「ダブルクリックで URL/パスを pbcopy」を試したが、
# Terminal.app + 分割ペイン + ドラッグ選択で表示が崩れる (フォント拡大・テキスト全体が
# ずれる) グリッチが出たため mouse off に戻した (ユーザー判断)。これは Terminal.app の
# マウスレポート実装の弱さが原因で tmux 設定では解消できない (tmux#816)。
# URL/パスのコピーが必要なら: キーボード copy-mode (prefix + [ → v → y で pbcopy) か、
# Terminal.app のネイティブ選択 (mouse off なら通常ドラッグがそのままネイティブ選択)。
# マウスで使いたい要求が再燃したら iTerm2 の tmux -CC 統合 (ペインが本物の native split に
# なり選択がペイン単位で正確) への移行を先に検討すること。
set -g mouse off

# Vim風ペイン移動のキーバインド。
# ⚠️ 移動系に -r (repeat) を付けないこと: 移動直後 repeat-time 以内にシェルへ打った
# h/j/k/l が移動と解釈される誤爆が実際に起きたため外した (2026-07-04)。
# 連打が欲しいのはリサイズ (下の H/J/K/L) だけなので、そちらにのみ -r を残す
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
# Ctrl を押しっぱなしでも移動できるように (C-t を押したまま C-h/j/k/l)。
# prefix テーブル内のみの bind なので、シェルの C-h(BS)/C-l(clear) には影響しない
bind C-h select-pane -L
bind C-j select-pane -D
bind C-k select-pane -U
bind C-l select-pane -R

# Vim風ペインリサイズのキーバインド（大文字、-r で連打可能）
# 小文字 h/j/k/l（移動）と衝突しないよう大文字に割当
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# クリップボード系(enterでコピー)
set-window-option -g mode-keys vi

# コピーモードに入る: 以下の3通りを共存させる
#   1) prefix + [        … tmux デフォルトと同じだが意図を明示
#   2) prefix + Ctrl+[   … 端末上 Ctrl+[ は Esc(=^[) と同一バイトのため tmux には
#                          Escape として届く。[ を押すつもりで小指が Ctrl に乗っても発火
#   3) M-[ (Prefix なし) … Alt+[。手早く入りたい時用
# 注意: 3) は矢印キー等のエスケープシーケンス(\e[A 等)が \e[ 始まりのため
#       稀に誤爆しうる。それでも素早さを優先して残している。
bind-key [ copy-mode
bind-key Escape copy-mode
bind-key -n M-[ copy-mode

bind-key -T copy-mode-vi Space send-keys -X begin-selection
# vim と同じ v でも選択開始できるように (Space と併存)
bind-key -T copy-mode-vi v     send-keys -X begin-selection
# y / Enter ともシステムクリップボード (pbcopy) へコピーして copy-mode を抜ける
bind-key -T copy-mode-vi y     send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# copy-mode のネオン配色 (4 オプションとも 3.5a 実在・従来は未設定=デフォルト色)。
# / 検索の全ヒットがシアン発光し、現在ヒットだけマゼンタ×白 bold で別格に光る。
# - mode-style: 選択範囲 (ピンク帯)。⚠️ choose-tree (prefix+w) 等の他 window mode の
#   ハイライトにも効く (3.5a では copy-mode 専用の selection-style は無く mode-style が兼務。
#   copy-mode-selection-style / position-style は 3.6+)
# - match-style: 検索の全ヒット / current-match-style: 現在のヒット / mark-style: マーク行
set -g mode-style 'bg=colour201,fg=colour16,bold'
set -g copy-mode-match-style 'bg=colour17,fg=colour51'
set -g copy-mode-current-match-style 'bg=colour201,fg=colour231,bold'
set -g copy-mode-mark-style 'bg=colour208,fg=colour16'

# backspaceでウィンドウを戻る
bind-key BSpace previous-window
# spaceでウィンドウを進む
bind-key Space next-window
# Tab で「直前にいたウィンドウ」とトグル (デフォルト l の last-window 相当。
# l はペイン移動に使っているため Tab に退避。claude 窓 ⇄ 作業窓の往復用)
bind-key Tab last-window

# Ctrlを押しっぱなしでもよいように
bind C-c new-window -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind C-n next-window
bind C-p previous-window

# 再読み込みをキーバインドしておく
bind R source-file ~/.tmux.conf \; display-message "Reload Config!!"

# ペイン分割のキーバインド
# screen の "split -v"（垂直分割＝左右に分割）に相当
bind v split-window -h -c "#{pane_current_path}"
bind \| split-window -h -c "#{pane_current_path}"
# screen の "split"（水平分割＝上下に分割）に相当
bind s split-window -v -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ペインボーダーの視認性向上
# アクティブペインの枠は明るい緑の線で強調する。
# 境界セルの背景色は塗らない。隣接 pane と半分ずつ色が混ざる tmux の
# border 描画仕様を避けるため、現在地は上端の ACTIVE ラベルで補う
# NOTE: window-style / window-active-style による非アクティブペインの背景 dim は
# 一度 2026-06-10 に不採用としたが、アクティブ pane の識別が線だけでは弱いとの判断で
# 2026-06-12 に再採用 (下の window-style 2行)。まだ様子見中で、合わなければ撤回しうる
set -g pane-border-style        fg=colour238
# アクティブ枠はセル背景まで緑で塗りつぶしてベタ帯にする (fg=bg で線グリフを消し、
# 1セルを丸ごと発光させる)。tmux のボーダーは1セル幅が上限なので、太さの限界まで
# 視認性を上げる手段はこの「線グリフ → ベタ塗り」化。fg のみだと細い線のまま。
# モード連動で三段変色 (style の format 展開, tmux 3.2+。upstream デフォルトと同じ優先順):
#   copy-mode 中=黄 (colour226) / synchronize-panes 中=赤 (colour196) / 通常=緑 (colour46)。
# sync の赤は「入力が全 pane に飛ぶ」誤爆警告。zoom の赤 (colour160, window list 側) とは
# 別事象だが「赤=危険/特殊状態」の意味は揃えている。copy-mode 中はカーソル緑と枠黄が
# 一時的にずれるが、モード識別を優先 (man: border style の Attributes は無視され色のみ有効)
set -g pane-active-border-style '#{?pane_in_mode,fg=colour226#,bg=colour226,#{?pane_synchronized,fg=colour196#,bg=colour196,fg=colour46#,bg=colour46}}'
# ボーダー線を二重線にして枠を見かけ上いちばん太くする (tmux 3.2+)。
# heavy は極太の1本線、double は2本の平行線。1セル幅が上限なのでこれ以上は太くできない
set -g pane-border-lines double
# 非アクティブ pane を一段暗く沈め (bg=colour234)、アクティブ pane は青背景 (colour17=濃紺) に
# して一目で識別できるようにする。線1セルの色差より面全体の色差の方が視野の端でも瞬時に分かる。
# アクティブの青は scratch popup の内側 (scripts/tmux_scratch_popup.sh の -s bg=colour17) と同色で統一している。
# ⚠️ nvim/claude 等が自前で背景を塗るアプリ内は影響せず、素のプロンプトのペインで最も効く
#   (アプリ内は従来どおりアプリ側の背景になる)。
# 調整: 非アクティブは colour234→colour236、アクティブは colour17 を変更。
# アクティブを元の terminal default に戻すなら window-active-style の bg=colour17→bg=terminal。
set -g window-style        'fg=colour247,bg=colour234'
set -g window-active-style 'fg=terminal,bg=colour17'
# ウィンドウ端にアクティブペインを指す矢印も表示 (colour + arrows, tmux 3.4+)
set -g pane-border-indicators both
# 各ペイン上端にタイトルバーを表示し、境界とカレント情報を一目で分かるようにする
set -g pane-border-status top
# アクティブペインのカーソルを緑の明滅ブロックにする (tmux 3.4+)。
# カーソルはアクティブペインにしか存在しないため、背景色に触らずに
# 現在地を示す点光源になる (アクティブ枠の発光帯 colour46 と同色で統一)。
# NOTE: nvim 等がエスケープシーケンスで自前のカーソル形状・色を設定する
# アプリ内ではアプリ側が優先される (zsh プロンプト等の素のペインで効く)
set -g cursor-style blinking-block
set -g cursor-colour colour46
# copy-mode のスクロールバーは無効化 (off)。
# tmux 3.6a ではバー表示中は必ずペインが 1 列分 narrow され本文が reflow されるため
# (man tmux: "the pane is narrowed by the width of the scrollbar")、copy-mode 突入時に
# 幅・高さがズレる。overlay 表示は無い。位置表示より幅の安定を優先して off にする。
# 常時表示で幅ジャンプだけ避けたい場合は on (ただし通常時も 1 列消費)。
# ⚠️ pane-scrollbars は tmux 3.6 で追加されたオプション。3.5 以前で素に set すると
#    source-file 時に "invalid option: pane-scrollbars" 警告が出る (この行だけスキップ
#    され他は適用される)。古い tmux でも警告を出さないよう if-shell でバージョンを
#    数値比較し 3.6 以降のときだけ set する (sed で数字とドットのみ抽出 → major/minor を
#    整数比較するので 3.10 等でも壊れない)。tmux を 3.6+ に統一したらガードを外して
#    素の `set -g pane-scrollbars off` に戻してよい。
# 3.6 未満では else 節で upgrade を促す警告を出す: client があればステータス行に
# (display-time 間)、headless / 外部 source なら config 行番号付きで stderr に出る
# (どちらの経路でも気づける。実測で確認)。#{version} は display-message が実行時に展開する。
if-shell 'v=$(tmux -V | sed "s/[^0-9.]//g"); maj=${v%%.*}; min=${v#*.}; min=${min%%.*}; [ "$maj" -gt 3 ] || { [ "$maj" -eq 3 ] && [ "$min" -ge 6 ]; }' \
  'set -g pane-scrollbars off' \
  'display-message "⚠️ tmux #{version} は古い: pane-scrollbars 無効化中。3.6+ 推奨 (brew upgrade tmux)"'
# pane-border-format の構成 (左から):
# - #{?@claude_state,...,}: Claude Code の hook (~/dotfiles/_claude/hooks/tmux-pane-state.sh)
#   が pane 単位で書き込む作業状態。working=黄 (colour220) / input=赤 (colour203) /
#   seen=灰 (colour244: 入力待ちを見たが未応答) / idle=緑 (colour10) で色分け。
#   未設定なら空に展開され通常ペインには出ない
# - ペイン番号 + パス + コマンド: アクティブペインは ACTIVE ラベルを明緑帯 + 黒文字で表示。
#   ボーダーは線だけを明緑にし、非アクティブは灰色文字。
#   ※青帯(colour31)+白文字は視認しにくいと判断して変更 (2026-06-10)
#   ${HOME} は tmux が conf 読込時に展開し、#{s|...|~|:} でパス表示を ~ に短縮
# - ズーム中（prefix+z）は解除ヒントを赤字で表示
set -g pane-border-format " #{?@claude_state,#{?#{m:*working*,#{@claude_state}},#[fg=colour220],#{?#{m:*input*,#{@claude_state}},#[fg=colour203],#{?#{m:*seen*,#{@claude_state}},#[fg=colour244],#[fg=colour10]}}}#{@claude_state}#[default] ,}#{?pane_active,#[fg=colour16#,bg=colour46#,bold] ACTIVE #P: #{s|${HOME}|~|:pane_current_path} (#{pane_current_command}) ,#[fg=colour245] #P: #{s|${HOME}|~|:pane_current_path} (#{pane_current_command}) }#[default]#{?window_zoomed_flag,#[fg=colour160] 🔍 ZOOM (prefix+z で解除)#[default],} "

# ペイン番号オーバーレイから選んで現在ペインと入れ替え (prefix + e)
# 画面に大きく番号が出るので、数字キーを押すとそのペインと現在ペインが交換される
# ペイン入れ替えは e に一本化 (ユーザー判断 2026-06-12)。swapmode (S + h/j/k/l 連打,
# 61a8256 で追加) は e と重複するため削除。デフォルトの rotate-window (M-o) と
# swap-pane ({/}) も誤操作の元 (全ペインが意図せず回転する事故) のため無効化。
# 複数の swap 手段を再導入したくなったら、まず e で不足する点を言語化すること
# (C-o は下で select-pane に再割当てしている。rotate ではないので回転事故は起きない)
bind e display-panes -d 0 'swap-pane -t %%'

# pane のアクティブ切替 (次の pane を選択 / 2 pane なら実質トグル)。
# デフォルトの o に加えて C-o でも同じ動作にする (prefix を押した指のまま Ctrl で連打できる)。
# C-o はかつて rotate-window を誤発火させる事故防止のため unbind していたが、
# rotate ではなく安全な select-pane を割り当てることで誤操作リスク自体を解消する。
# -r なし: 移動系の repeat はシェル入力との誤爆源のため付けない (上の h/j/k/l と同方針)
bind o   select-pane -t :.+
bind C-o select-pane -t :.+
unbind M-o
unbind '{'
unbind '}'

# window を跨ぐ pane 移動 (C-t f と同じ fzf popup で相手 window を選ぶ)。
# g = get: 一覧から選んだ window のアクティブ pane を現在の window へ持ってくる
# G = give: 現在の pane を一覧から選んだ window へ送る
# choose-window 版はゴチャついて見づらいという判断で fzf popup に変更 (2026-06-11)。
# 同一 window 内の配置換えは C-t e (番号 swap) の担当
bind g display-popup -E -w 85% -h 70% '${DOTFILES_DIR:-$HOME/dotfiles}/scripts/tmux_fzf_pane_move.sh get'
bind G display-popup -E -w 85% -h 70% '${DOTFILES_DIR:-$HOME/dotfiles}/scripts/tmux_fzf_pane_move.sh give'

# 全セッションのウィンドウを fzf popup で選んでジャンプ (prefix + f)。
# デフォルトの f (find-window) を置換 (fzf が上位互換)。プレビューに選択中
# ウィンドウの画面内容を表示。クォートは run-shell 系と同方針で
# /bin/sh に ${VAR:-default} を解決させる (単一引用符で tmux の展開を抑止)
bind f display-popup -E -w 85% -h 70% '${DOTFILES_DIR:-$HOME/dotfiles}/scripts/tmux_fzf_jump.sh'

# 画面からの吸い出し (prefix + y = 画面から yank)。extrakto 型。
# 現在ペインの画面+履歴から URL / パス / git ハッシュ / 単語を抽出して fzf で選び、
# 貼り付け (Enter) / コピー (C-y) / 開く (C-o)。対象ペインの解決は popup 内シェル側
# (スクリプト冒頭コメント参照。popup 内では #{...} が展開されないため)。
bind y display-popup -E -w 85% -h 70% '${DOTFILES_DIR:-$HOME/dotfiles}/scripts/tmux_extract_popup.sh'
# C-y 版 (Ctrl 押しっぱなしの y でも開ける。bind C-t = scratch と同じ配慮)
bind C-y display-popup -E -w 85% -h 70% '${DOTFILES_DIR:-$HOME/dotfiles}/scripts/tmux_extract_popup.sh'

# スクラッチターミナル popup のトグル (prefix + t)。デフォルトの t (clock-mode) を置換。
# 専用セッション scratch をフローティングで attach し、popup 内で再度 C-t t すると
# detach して閉じる (セッションは生き続けるので作業状態は保持される)。
# nested attach ガードを越えるため TMUX= をクリアして同一サーバに attach する。
# scratch は popup 内の nested tmux なので、枠線(pane-border)マーキーは出せない
# (popup はオーバーレイで枠線を持たない)。代わりに二段で派手にする:
#   (静的) -b heavy 太線 2 色枠 (罫線 fg=colour33 電子ブルー × 地 bg=colour201 ピンク固定) +
#          内側濃紺 (-s bg=colour17) + 開いた時刻入りの動的タイトル (スナップショット)。
#          ※「開くたびに枠色が変わるガチャ」は視覚アイデンティティ優先で不採用 (ユーザー判断 2026-07-02)
#   (点滅) popup 内 scratch の status-left が毎秒色反転 + スピナー ◐◓◑◒ 回転 (status-left の
#          コメント参照) + status 2 行目に時計/パス/コマンドの Powerline 島 (status-format[1])
# 開き側の実装・色定義・不変条件 (unset TMUX TMUX_TMPDIR / has-session ガード / -A 禁止 /
# status 2) は scripts/tmux_scratch_popup.sh に集約 (冒頭コメント参照)。
# ※ popup 表示中に背後を暗転させる「スポットライト」(擬似立体, tmux_scratch_spotlight.sh) を
#   一度実装したが、実使用でバグり取り消した (ユーザー判断 2026-07-02, revert of 0f33e2d)。
#   再挑戦する場合は dim/undim の対称性 (undim 漏れ・二重 dim・scratch session 保護) の
#   実機検証を popup の実 attach 経路で行うこと (headless 検証では popup 内の挙動を再現しきれなかった)。
# スクリプト化の理由: bind の二重引用符内に長大な引用ネストを置かないため。
# #{client_name} は run-shell の format 展開で渡し、popup の表示先 client を明示する。
# 閉じる側 (THEN: detach-client) の後に refresh を強制する: tmux 3.5a の popup overlay 再描画
#   同期バグ (issue #4920、fix は未リリースの 3.7/HEAD のみ。stable 3.6b 未収録) で、閉じた後に
#   ボーダーが ~1秒残る/もっさりするため。残骸は次の再描画サイクル(status-interval≒1秒)で自動的に
#   消えるので、閉じた直後に明示 refresh-client して即潰す (scripts/tmux_refresh_all_clients.sh)。
#   tmux を 3.7+ に上げたら本 `; run-shell -b '...'` とスクリプトは不要 (削除可)。
#
# ⚠️ 2026-06-28 scratch(bind t) は復活済み / fork(bind b) は無効維持:
#   下記の経緯で両 bind を一時停止していたが、server exit の真因は孤児サーバの複合（popup 仮説は反証
#   寄り）と判明し、孤児発生源（旧 -A 起動）も予防済みのため、ユーザ判断で scratch を先行復活した。
#   fork(bind b) は引き続き A/B 観測のため無効のまま（再発有無を切り分け中）。
#   2026-06-27〜28 に追加した popup 機構（この scratch=bind t と fork=bind b）を境に、tmux サーバが
#   "[server exited]"（全セッション消滅 + exit-empty による graceful shutdown。crash レポートは無い）で
#   頻発して落ちる症状が出た、として両 bind を一時停止した（当初仮説: display-popup -E 内の nested
#   `tmux attach` が tmux 3.5a の popup バグを踏む）。
#   2026-06-28 の精査でこの popup 仮説は反証寄りになった: server exit + restore 不発の主因は、
#   (1) 継承 TMUX_TMPDIR 上に作られた孤児 tmux サーバ（socket 消滅後もプロセス残存）が continuum の
#   Gate2 を恒久的に破り auto-restore を skip → (2) restore 不発で貧弱再起動 → (3) upstream save.sh の
#   無条件 `ln -fs last` が完全状態を貧弱保存で上書き、という複合だった（孤児発生源は旧 scratch popup の
#   `new-session -A -s scratch`。現行は -A 不使用 + 下記 reap で対処）。popup の nested attach が exit を
#   起こす因果は未観測。ただし孤児が残ったままでは clean な A/B が取れないため、孤児掃除 + 構造修正後に
#   数日 popup 無効のまま再発有無を観測する方針（再発しなければ popup 無罪確定 → 両 bind 復活）。
#   ※ scratch だけ先に戻したい場合はこの bind t のコメントアウトだけ外す（fork は別途 bind b 参照）。
#   開閉判定・popup 演出・孤児予防 (`unset TMUX TMUX_TMPDIR` / has-session ガード) の実体と
#   不変条件は scripts/tmux_scratch_popup.sh に集約してある。bind はスクリプト呼び出しのみ。
bind t run-shell '${DOTFILES_DIR:-$HOME/dotfiles}/scripts/tmux_scratch_popup.sh "#{client_name}" "#{session_name}"'
# C-t 版 (Ctrl 押しっぱなしの t 2 連打で開閉)。旧 send-prefix を転用 (prefix 節のコメント参照)。
bind C-t run-shell '${DOTFILES_DIR:-$HOME/dotfiles}/scripts/tmux_scratch_popup.sh "#{client_name}" "#{session_name}"'

# フォーク Claude 会話の popup トグル (prefix + b)。scratch (bind t) の型をミラーした
# 「フォーク版 scratch」。Claude 会話で /fork-scratch (_claude/commands/fork-scratch.md) を
# 実行すると、今の会話を `claude --resume <id> --fork-session` でフォークして detached な
# tmux セッション claude-fork に起動する。それをこのキーで scratch 風に覗く。
# - 開く側 (ELSE): claude-fork に attach。存在判定・status-left 上書き・空セッションを作らない
#   案内は scripts/tmux_fork_popup.sh に集約 (scratch より分岐が多いのでインラインせずスクリプト化。
#   bind の二重引用符内に shell の二重引用符をネストする危険を避ける)。fork セッションは
#   /fork-scratch でのみ作るので、ここで素の new-session はしない (空シェルの偽 fork 防止)。
# - 閉じる側 (THEN): scratch と同じく detach-client + refresh。tmux 3.5a の popup overlay 再描画
#   バグ #4920 (閉じた後にボーダーが ~1秒残る) を tmux_refresh_all_clients.sh で即潰す。
#   tmux 3.7+ に上げたら `; run-shell -b '...'` は不要 (bind t と同じ・同時に外せる)。
# - 枠/中身の色は scratch (青×ピンク×濃紺) と区別して緑系 (枠 fg=colour48/bg=colour22・
#   内側 bg=colour234) + 🌿 タイトル。「枝分かれ=フォーク」を色とアイコンで一目で分ける。
# - new-session -d -A は使わない (popup 内の close 用 C-t b が 1 回効かず「2 回押し」回帰になる。
#   bind t コメント参照)。tmux_fork_popup.sh も attach のみで -A を使わない。
# - ${DOTFILES_DIR:-$HOME/dotfiles} は if-shell の二重引用符内なので \$ でエスケープし
#   (tmux の展開を抑止)、単一引用符で /bin/sh に既定値を解決させる (bind t の THEN と同方針)。
#
# ⚠️ 2026-06-28 一時無効化（A/B 観測のため維持中。bind t の同日コメントが詳細）:
#   当初は「fork 機能追加 e255de0 を境に server exit が頻発」として fork 経路を疑い停止した。
#   2026-06-28 の精査で真因は popup/fork ではなく「孤児 tmux サーバ → continuum Gate2 破り →
#   restore 不発 → 貧弱 last 上書き」の複合と判明（詳細は bind t のコメント）。fork の nested attach が
#   exit を起こす因果は未観測。孤児掃除 + 構造修正（reap / テスト隔離）後に、clean な状態で数日
#   fork 無効のまま再発有無を観測してから復活判断する。
#   ペアで無効化: _claude/commands/fork-scratch.md（同日付の同コメントあり）。
#   復活時の注意: fork セッション(claude-fork)も実 default socket 側に作る必要があるため、起動経路
#   (/fork-scratch / tmux_fork_popup.sh) は継承 TMUX_TMPDIR を持ち込まないこと（bind t の予防と同趣旨）。
# bind b if-shell -F '#{==:#{session_name},claude-fork}' "detach-client ; run-shell -b '\${DOTFILES_DIR:-\$HOME/dotfiles}/scripts/tmux_refresh_all_clients.sh'" "display-popup -E -w 80% -h 75% -b heavy -S fg=colour48,bg=colour22,bold -s bg=colour234 -T '#[fg=colour231] 🌿 FORK — claude --fork-session (C-t b で閉じる) ' '\${DOTFILES_DIR:-\$HOME/dotfiles}/scripts/tmux_fork_popup.sh'"

# ペイン削除・一括削除のキーバインド
# kill 系は誤爆防止のため確認を挟む。confirm-before はステータス行表示で
# 見落としやすいため、画面中央の display-popup + gum confirm にしている。
# y / 矢印・Tab + Enter で実行、n / Esc でキャンセル。デフォルトフォーカスは「やめる」。
# gum 未インストール時は exit 127 で && が短絡し kill されない (= fail-safe)。
# zshrc 起動時の不足警告で brew install gum を催促している。
# 実例: C-t q の誤爆で実行中の claude セッションごと他ペインが全 kill された (2026-06-10)
#
# ⚠️ display-popup の shell-command 内では #{...} フォーマットは展開されない
# (tmux 3.6a で実測。-e の値も展開されない / popup 内に TMUX_PANE も無い)。
# そのため対象ペインは popup 内シェルから `tmux display-message -p` で解決する。
# popup 内からの暗黙ターゲットは popup 直下のアクティブペインを指す (実測済)。
# 冒頭で pane_id を $p に固定してから confirm するので、確認した相手と kill する
# 相手が一致する。tmux 側が shell-command のフォーマット展開に対応したら簡略化可。
# 現在のペインを閉じる
bind x display-popup -E -w 60 -h 8 -b rounded -S "fg=yellow" -T " ペイン kill 確認 " \
  'p="$(tmux display-message -p "#{pane_id}")" && c="$(tmux display-message -p -t "$p" "#{pane_current_command}")" && gum confirm --default=false --affirmative "kill する" --negative "やめる" "このペイン ($c) を kill する？" && tmux kill-pane -t "$p"'
# 現在以外の全ペインを閉じる（screen の "only" に相当）
bind q display-popup -E -w 60 -h 8 -b rounded -S "fg=red" -T " 全ペイン kill 確認 " \
  'p="$(tmux display-message -p "#{pane_id}")" && gum confirm --default=false --affirmative "kill する" --negative "やめる" "他の全ペインを kill する？" && tmux kill-pane -a -t "$p"'

# 肥大化したスクロールバックを即時解放してメモリを返す (prefix + M-c)。
# スクロールバックは全ペイン RAM 常駐で disk 退避オプションが無いため、膨れた history を
# 今すぐ返す唯一の手段が clear-history (history-limit を下げても既存ペインには遡及しない)。
# kill 系 (bind x/q) と同じく破壊的 (全ペインのスクロールバックが消える) なので
# display-popup + gum confirm で確認を挟む。gum 未導入時は exit 127 で && が短絡し
# 何もしない (fail-safe)。
# #{pane_id} は popup 内シェルが叩く tmux に解決させる (popup の shell-command 内では
# tmux 側のフォーマット展開が効かないため。bind x/q と同方針)。
bind M-c display-popup -E -w 64 -h 8 -b rounded -S "fg=yellow" -T " history 解放確認 " \
  'gum confirm --default=false --affirmative "解放する" --negative "やめる" "全ペインのスクロールバックを解放してメモリを返す？" && tmux list-panes -a -F "#{pane_id}" | xargs -n1 tmux clear-history -t'

# Prefixなしでウィンドウ移動 (Alt + n/p)
bind -n M-p previous-window
bind -n M-n next-window

# Prefixなしでペインを移動（端でループしない）
# #{?pane_at_X,0,1} = 「X端にいなければ真」。端にいるときは何もしない (ラップ防止)。
# 旧実装は条件が逆 (端にいるときだけ逆端へラップ) + h/l の方向が交差していて機能していなかった
bind -n M-h if-shell -F '#{?pane_at_left,0,1}'   'select-pane -L'
bind -n M-j if-shell -F '#{?pane_at_bottom,0,1}' 'select-pane -D'
bind -n M-k if-shell -F '#{?pane_at_top,0,1}'    'select-pane -U'
bind -n M-l if-shell -F '#{?pane_at_right,0,1}'  'select-pane -R'

# ------------------------------
# tmux plugins (vendored)
#
# - 手動インストールなしで動くように、リポジトリ内にベンダーしたプラグインを読み込む
# - DOTFILES_DIR があればそれを優先、なければ $HOME/dotfiles を参照する
set -g @continuum-restore 'on'

# 自動復元の発火窓を既定 10 秒 → 60 秒に広げる（復元不発の二大要因のうち Gate1 対策）。
# continuum の just_started_tmux_server (vendor continuum.tmux:46-52) は「サーバ起動から
# @continuum-restore-max-delay 秒以内に conf が source された」ときだけ restore を発火する。
# 外部 (Claude Code / IDE 等) が `tmux new-session -d -s ...` でサーバを起こすと conf source が
# 起動から 10 秒より遅れて restore 窓を外しうる（実測: save-last が start_time +16 秒だった事例）。
# 60 秒に広げて外部起動でも確実に発火させる。もう一方の要因 Gate2（他 tmux サーバが居ると
# continuum_restore.sh:25 が restore を丸ごと skip）の本丸は「孤児 tmux サーバを残さない」こと:
# vendor helpers.sh の all_tmux_processes は `ps | grep '^tmux'` を socket 生存に関係なく数えるため、
# socket だけ消えてプロセスが残った孤児サーバが 1 台でも居ると Gate2 が恒久的に restore を skip する
# （2026-06-28 に判明: 孤児 scratch 2 台で 17 日間 復元不発）。対策は二段:
#   (1) 発生源を断つ = テスト/popup が継承 TMUX_TMPDIR 上に偽 socket を作らない（tests/ と bind t を修正）、
#   (2) backstop = tt 起動時に socket 消滅済みの孤児だけを reap（scripts/tmux_reap_orphan_servers.sh、
#       zshlib/_tmux_session.zsh の _tt_impl から server 起動前に呼ぶ）。
# probe leak 修正（test_tmux.sh）は (1) の一部にすぎず、それ単体では Gate2 を塞げない点に注意。
#
# KNOWN LIMITATION (未対応・2026-07-02 バグハントで確定 P3): max-delay を 60 に広げた副作用で、
#   サーバ起動から 60 秒以内の手動 reload (bind R = 264行の source-file) が auto-restore を
#   再発火しうる。continuum の just_started_tmux_server (continuum.tmux:46-52) は「start_time から
#   max-delay 秒以内に main が走ったか」しか見ず boot 起動と手動 reload を区別できないため、
#   boot 直後に tt→復元→設定を直して prefix+R、を 60 秒以内にやると restore.sh が再走する
#   (pre-restore-all が @tt-restore-complete を unset し in-progress を再セット / 直近 10 秒以内に
#   kill した window が debounce 保存前ならゾンビ復元 / 既存 pane はプロセス復元 skip でほぼ冪等)。
#   既定 10 秒ではほぼ踏めなかった窓が 6 倍に広がった。
#   未対応の理由: 修正案「@tt-restore-complete が非空なら continuum ロードを gate」は、この後 594-595 行の
#   continuum.tmux 再実行が add_resurrect_save_interpolation で周期 autosave を再注入している
#   (121行の status-right="" が source ごとに interpolation を消すため) のを止めてしまい、
#   reload 以降サーバ再起動まで周期 autosave が silent に死ぬ (バグより悪い)。案「bind R を部分
#   source に分割」も同じ interpolation 再注入と plugin 再ロードの依存で綺麗に切れない。
#   実害は「起動 60 秒以内の reload」限定 + ほぼ冪等 (冪等でない窓は直近 10 秒の kill と重なる稀ケース)
#   なので、upstream の再発火 gate が入るまで当面は未対応とし本コメントで申し送る。
set -g @continuum-restore-max-delay '60'

# [観測] サーバ起動 / conf source ごとに restore 発火の前提値を記録する（Fix C）。
# continuum の restore skip は完全に silent で、今回も「17日間 restore 不発」に気づけたのは
# tt-restore-duration.log の凍結という間接証拠だけだった。procs= は Gate2 の入力
# (vendor helpers.sh:25-31 と同じ `^tmux` プロセス数) で、これが多いと restore は skip される。
# 次に復元不発が起きたとき「他 tmux プロセスが N 個あって skip された」を後追いできるようにする。
# HOME 隔離のテストは自分の temp HOME/.cache に書くため実ログを汚さない。
run-shell -b '{ mkdir -p "$HOME/.cache" && printf "%s\tconf-source tmux_procs=%s last=%s\n" "$(date +%FT%T)" "$(ps -u $(id -u) -o command | grep -c "^tmux")" "$(readlink "${XDG_DATA_HOME:-$HOME/.local/share}/tmux/resurrect/last" 2>/dev/null)" >> "$HOME/.cache/tt-restore-trigger.log"; } 2>/dev/null || true'

# ペイン内容（スクロールバック）も保存・復元する
set -g @resurrect-capture-pane-contents 'on'

# 自動復元の進行状態を示すフラグを立てる/降ろすフック。
# - pre-restore-all : まず完了状態(@tt-restore-complete / @tt-restore-duration)を
#   unset してクリアし、次に @tt-restore-in-progress=<開始epoch> を立てる。
#   完了フラグのクリアを pre で明示的に行うのは「pre でクリア → post でセット」の
#   不変条件を保つため。これが無いと前回復元の @tt-restore-complete=1 が残った状態で
#   _tt_wait_for_restore が今回の post を待たず即 rc=0 になり、復元途中 attach や
#   古い @tt-restore-duration の flash を招く（tt 側は -n 判定なので 0 代入では不可、
#   unset/空が必要）。現状は新規サーバ起動でオプションが消えるため再起動跨ぎでは
#   起きにくいが、live サーバで wait を再入する経路が増えた場合に備えて明示する。
# - post-restore-all: 復元完了時に所要時間を計算 → @tt-restore-duration に格納 +
#   ~/.cache/tt-restore-duration.log に追記し、@tt-restore-in-progress=0 を経て
#   最後に @tt-restore-complete=1 を立てる。
# @tt-restore-complete は tt() がこのフラグが立つまで待ってから attach するため、
# 復元途中での attach（部分復元）やサーバ巻き込み kill を避けられる。
# @tt-restore-in-progress は下の window hook による debounce 保存が「復元中の
# 部分状態を last に焼き付けない」ためのガード（scripts/tmux_resurrect_debounced_save.sh）。
# 値を epoch にするのは、(a) 復元途中クラッシュで post-restore-all が走らずフラグが
# 降り損ねても保存側が TTL 超過で「降り損ね」と判定して保存を再開できるように、かつ
# (b) post 側が「完了時刻 - 開始epoch」で復元所要秒を算出できるようにするため。
# @tt-restore-duration は tt()（_tt_impl）が attach 時にステータスラインへ
# 「復元: Ns」と flash するために読む。flash を tt 側で出すのは、本フックの発火時点
# では tt がまだ attach しておらず display-message の表示先クライアントが無いため。
# post の set 順序は重要: @tt-restore-duration を必ず先に、@tt-restore-complete=1 を
# 最後に立てる（tt が complete を見た時点で duration が確定している保証）。ログ書き込み
# 失敗（{ } 2>/dev/null）はフラグ確定を妨げない（後続の set-option は ; で必ず走る）。
# （execute_hook は eval で実行するので $(date +%s) 等は発火時に評価される）
set -g @resurrect-hook-pre-restore-all 'tmux set-option -gu @tt-restore-complete; tmux set-option -gu @tt-restore-duration; tmux set-option -g @tt-restore-in-progress $(date +%s)'
set -g @resurrect-hook-post-restore-all 'tt_s=$(tmux show -gqv @tt-restore-in-progress); tt_d=$(( $(date +%s) - ${tt_s:-0} )); tmux set-option -g @tt-restore-duration "$tt_d"; { mkdir -p "$HOME/.cache" && printf "%s\trestore=%ss\n" "$(date +%FT%T)" "$tt_d" >> "$HOME/.cache/tt-restore-duration.log"; } 2>/dev/null; tmux set-option -g @tt-restore-in-progress 0; tmux set-option -g @tt-restore-complete 1'

# window の作成/削除を契機に resurrect 保存を debounce して走らせる。
# continuum の周期 autosave（15分）だけだと、最後の保存以降に増やした window が
# 再起動で失われる（snapshot staleness）。window-linked / window-unlinked から
# debounce 保存を呼び、損失窓を秒オーダーに縮める。
# 復元中（@tt-restore-in-progress）/ bootstrap hold 存在中は保存しないガードと、
# 多重起動 lock・debounce token はスクリプト側に集約（同ファイル冒頭コメント参照）。
# NOTE: クォートに注意。tmux は二重引用符内 / 非引用の ${...} を自前で展開するが、
# ${VAR:-default} の :- 既定値構文は非対応で "invalid environment variable" になる。
# そのため $ を \$ でエスケープして tmux の展開を抑止し、run-shell 引数を単一引用符で
# くるんで fire 時の再パースでも展開させず、最終的に /bin/sh に ${DOTFILES_DIR:-$HOME/dotfiles}
# を解決させる（下の plugin load の run-shell と同じ「shell が既定値を解決する」方針）。
set-hook -g window-linked   "run-shell -b '\${DOTFILES_DIR:-\$HOME/dotfiles}/scripts/tmux_resurrect_debounced_save.sh'"
set-hook -g window-unlinked "run-shell -b '\${DOTFILES_DIR:-\$HOME/dotfiles}/scripts/tmux_resurrect_debounced_save.sh'"
# ペイン構成の変化 (分割 / kill / プロセス終了によるペイン消滅) でも同じ debounce 保存を
# 発火させ、ペインレイアウトのスナップショット鮮度も秒オーダーにする (従来は 15 分周期
# 待ちだった)。復元中ガードはスクリプト側にあるため、resurrect の復元処理が大量に
# split-window してもここからの保存は走らない
set-hook -g after-split-window "run-shell -b '\${DOTFILES_DIR:-\$HOME/dotfiles}/scripts/tmux_resurrect_debounced_save.sh'"
set-hook -g after-kill-pane    "run-shell -b '\${DOTFILES_DIR:-\$HOME/dotfiles}/scripts/tmux_resurrect_debounced_save.sh'"
set-hook -g pane-exited        "run-shell -b '\${DOTFILES_DIR:-\$HOME/dotfiles}/scripts/tmux_resurrect_debounced_save.sh'"
# window をアクティブ化したら、その window 配下の 🔔 input を 🔕 seen (既読) に降格する。
# = 通知に気づいて window を見た時点で「未読ベル」を落とす (応答すると UserPromptSubmit
#   フックが working に上書きするため、seen は見た〜応答するまでの一時状態)。
# 引数の #{window_id} は run-shell の format 展開を期待するが、効かない環境では
# スクリプト側が現在 window に fallback する (tmux-mark-seen.sh 冒頭参照)。
set-hook -g after-select-window "run-shell -b '\${DOTFILES_DIR:-\$HOME/dotfiles}/_claude/hooks/tmux-mark-seen.sh #{window_id}'"

# [観測] session が閉じるたびに残セッション数を記録する。tmux サーバ突然 exit の真因切り分け用。
# server exit の主因は孤児/Gate2/貧弱上書きの複合と判明したが、popup の nested attach が exit を
# 誘発する可能性は未観測のため、observe-before-second-fix（CLAUDE.md「不具合対応の原則」）として
# 発火列を残す。次に exit したとき「session-closed が連続して remaining=0 → exit-empty で正常に
# 落ちた」のか「session-closed ログ無しでサーバ消滅 → kill-server/crash 等の外因」かを切り分けられる。
# 出力先は Fix B/C と同じ ~/.cache/tt-restore-trigger.log（HOME 隔離テストは temp HOME に書く）。
set-hook -g session-closed "run-shell -b '\${DOTFILES_DIR:-\$HOME/dotfiles}/scripts/tmux_log_session_closed.sh'"

# NOTE: tmux-continuum は tmux-resurrect に依存するため順序を守る
run-shell 'f="${DOTFILES_DIR:-$HOME/dotfiles}/vendor/tmux-plugins/tmux-resurrect/resurrect.tmux"; [ -f "$f" ] && bash "$f"'
run-shell 'f="${DOTFILES_DIR:-$HOME/dotfiles}/vendor/tmux-plugins/tmux-continuum/continuum.tmux"; [ -f "$f" ] && bash "$f"'

# 保存経路の競合防止: continuum 周期保存 / window 増減 debounce 保存 / 手動保存が
# 同時に upstream save.sh を起動すると、共有の save/ ディレクトリ・pane_contents.tar.gz・
# 同一秒の layout ファイルを壊し合い、空/部分アーカイブが last になりうる（continuum の
# lock は save を background 起動して即解放するため保存期間を保護しない）。
# @resurrect-save-script-path を単一 lock の wrapper に向け、全保存経路を直列化する。
# NOTE1: resurrect.tmux が plugin load 時に本オプションを vendored save.sh へ上書きするため、
#   必ず load 後（この行）で上書きする。run-shell（非 -b）は同期実行なので順序は保たれる。
# NOTE2: クォート注意。${VAR:-default} は tmux が展開できない（"invalid environment variable"）
#   ため、run-shell の単一引用符内で /bin/sh に解決させる（上の plugin load 行と同方針）。
run-shell 'tmux set-option -g @resurrect-save-script-path "${DOTFILES_DIR:-$HOME/dotfiles}/scripts/tmux_resurrect_save.sh"'

# 手動保存 (prefix + C-s) も wrapper 経由にする。resurrect の set_save_bindings は
# C-s に vendored save.sh を「直接パスで」bind し、@resurrect-save-script-path を経由
# しないため、上の option 上書きだけでは手動保存が lock を素通りして競合しうる。
# よって load 後にここで C-s を wrapper へ貼り替え、自動 (continuum/debounce) と手動を
# すべて同一 lock に集約する。引数なし = 非 quiet で従来どおり保存メッセージを表示。
# NOTE: クォートは run-shell 単一引用符内で /bin/sh に ${VAR:-default} を解決させる
#   (tmux は ${VAR:-default} を展開できないため。上の plugin load 行と同方針)。
bind-key C-s run-shell '${DOTFILES_DIR:-$HOME/dotfiles}/scripts/tmux_resurrect_save.sh'
