# vim: set filetype=tmux:

# ~/.tmux.conf
# 経緯・仕組みの一次情報は docs/ (theme-colors / tmux-window-fade / tmux-plugins / tmux-as-platform /
# claude-fork-popup) と各スクリプト冒頭コメント。ここには「編集すると壊れる罠」と意図だけを最小限で書く。
# クォート共通規約: tmux は ${VAR:-default} を展開できない ("invalid environment variable") ため、
# run-shell 系は単一引用符でくるみ /bin/sh に解決させる (set-hook / if-shell の二重引用符内は \$ 併用)。
#
# 要求 tmux 版数は .tmux-version が単一情報源 (新機能で上がったら同時更新)。実行中サーバが古ければ
# 警告のみ (機能は各所のガードで個別に劣化)。バイナリでなくサーバに聞く理由は tmux_version_gte.sh 冒頭参照。
if-shell '${DOTFILES_DIR:-$HOME/dotfiles}/scripts/tmux_version_gte.sh' \
  '' \
  'display-message "⚠️ tmux server #{version} は .tmux-version の要求未満: 一部機能が劣化表示。区切りのいい時に kill-server で新バイナリへ"'

# ------------------------------
# シェルと端末
set -g default-shell $SHELL

# tmux 内は tmux 用 terminfo。外側端末の機能は terminal-features で別途伝える
set -g default-terminal "tmux-256color"

# 外側ターミナルの対応機能 (RGB / OSC52 clipboard / CSI u extkeys / focus / title)。
# ⚠️ 区切りはコロン。カンマだと項目が別エントリ扱いで silent に無効化される (extkeys 脱落の実測あり)。
# ⚠️ -a 追記のため反映はサーバ再起動 (reload では旧エントリが残る)。
set -as terminal-features "xterm*:RGB:clipboard:extkeys:focus:title"
set -as terminal-features "tmux*:RGB"

# スクロールバックは全ペイン RAM 常駐 (disk 退避なし)。100000 はサーバ RSS の ~74% を占め過剰だった。
# ⚠️ 新規 window にのみ効く。既存ペインの解放は clear-history (prefix+M-c) かサーバ再起動。
set -g history-limit 30000

# エスケープシーケンス判定を短縮して入力遅延を抑える
set -sg escape-time 5

# CSI u / modifyOtherKeys を中継し Shift+Enter 等が tmux 内アプリ (Claude Code 等) に届く。
# on は「対応端末 + 要求したアプリ」のときだけ有効化されるので安全
set -s extended-keys on

# ペイン内アプリ (nvim の OSC52 yank 等) からのクリップボード書込を許可。信頼できないプロセスを
# 動かす共有/SSH 用途では 'external' に戻す
set -s set-clipboard on

# コマンドプロンプト (prefix+:) の履歴をサーバ再起動を跨いで保存
set -s history-file ~/.tmux_history

# window / pane 番号は 1 始まり (キーボードの 1 が左端に対応)
set -g base-index 1
setw -g pane-base-index 1

# 番号を詰めない: new-window が空き最小番号を埋める運用で「場所の記憶」を守る。
# (on は検討済み却下。off の旧副作用だった separator の左脇判定は単色化で消滅済み)
set -g renumber-windows off

# フォーカス変化をアプリへ通知 (vim の autoread / gitgutter 用)
set -g focus-events on

# prefix は C-t (screen の ^T 相当)。旧 send-prefix だった prefix+C-t は scratch トグルへ転用 (bind C-t)
unbind C-b
set -g prefix C-t

# ------------------------------
# status line。status on と status-right の確保は continuum の autosave に必要 (docs/tmux-plugins.md)
set -g status on

# 1 秒 = status-left 点滅の駆動。再描画は format 展開のみで fork ゼロ
set -g status-interval 1
set -g status-justify left

# バーは prefix 押下でも配色不変 (移動先が常に読める)。prefix 可視化は status-left の島が担当。
# (バー全体発光 / 2 行目常設は検討済み却下)
set -g status-style 'bg=colour235,fg=colour136'

# window 名 = アクティブペインの pane_title。zsh precmd/preexec が OSC 2 でセット
# (zshlib/_tmux_window_name.zsh)。\033k 直リネームは非アクティブペインが名を奪う事故源のため
# allow-rename off で禁止し OSC 2 に一本化
set -g automatic-rename on
set -g automatic-rename-format '#{pane_title}'
set -g allow-rename off
set -g status-left-length 70

# status-left の島: scratch セッションはマゼンタ/赤の毎秒反転 + スピナー、通常セッションは prefix
# 押下中だけ ⚡PREFIX ARMED⚡ (マゼンタ/緑反転)。末尾は copy-mode 検索中のみ黄地 🔍N の HUD。
# ⚠️ 島幅は両状態 20 セル固定 (window list のガタつき防止)。文言を変えたら p18: も同じ合計幅に合わせる。
# ⚠️ #{T:%S} 直書きは不可 (T: はオプション名を取る)。@secfmt 経由の strftime 展開が必須。
# ⚠️ #[...] は単一属性で書く (条件分岐内の未エスケープカンマが format を壊す)。
# 剰余による点滅は fork ゼロ。#[blink] は検討済み却下 (消灯位相で文字が読めない)。
set -g @secfmt '%S'

# 点滅 (2 相) / スピナー (4 相) の位相の単一定義 (#{E:} 参照。周期変更はここ 1 箇所)
set -g @blink-phase '#{e|m:#{T:@secfmt},2}'
set -g @spinner-phase '#{e|m:#{T:@secfmt},4}'
set -g status-left "#{?#{==:#{session_name},scratch},#{?#{E:@blink-phase},#[bg=colour201],#[bg=colour196]}#[fg=colour16]#[bold] ⚡ SCRATCH #{?#{==:#{E:@spinner-phase},0},◐,#{?#{==:#{E:@spinner-phase},1},◓,#{?#{==:#{E:@spinner-phase},2},◑,◒}}} (nested tmux) ⚡ #[default],#{?client_prefix,#{?#{E:@blink-phase},#[bg=colour201],#[bg=colour46]}#[fg=colour16]#[bold] ⚡ PREFIX ARMED ⚡ #[default]#{?#{E:@blink-phase},#[fg=colour201],#[fg=colour46]}#[default],#[fg=colour51#,bold]#[bg=colour51#,fg=colour235] #{p18:session_name} #[fg=colour51#,bg=colour235]#[default]}}#{?search_present,#[bg=colour226#,fg=colour16] 🔍 #{search_count} #[default],}"

# scratch 専用 2 行目 (popup スクリプトが scratch にだけ `set status 2`。通常セッションは 1 行で未描画)。
# ⚠️ ダブルクォート必須: シングルだと ${HOME} が literal になり、条件分岐内の literal `}` が format を
# 早期終端させて壊す
set -g 'status-format[1]' "#[fg=colour16]#[bg=colour201]#[bold] %H:%M:%S #[fg=colour201]#[bg=colour51]#[fg=colour16]#[bg=colour51] #{s|${HOME}|~|:pane_current_path} #[fg=colour51]#[bg=colour226]#[fg=colour16]#[bg=colour226] #{pane_current_command} #[fg=colour226]#[bg=default]#[default]"

# 右側は非表示 (continuum の hook 用に長さ 1 だけ確保)。
# NOTE: client-focus-in/out によるフォーカス喪失可視化は popup/menu を開くだけでも発火し誤判定する
# ため削除済み (再導入は popup 由来イベントの除外可否を先に検証すること)
set -g status-right-length 1
set -g status-right ""

# ------------------------------
# 非 current window の「放置フェード」: 最後にコマンドを実行してからの経過で、セル bg を
# @fade-step-secs 秒ごとに 1 段暗くする (紫の残光 → 地に溶ける)。仕様・仕組み・落とし穴の一次情報は
# docs/tmux-window-fade.md、色の意味は docs/theme-colors.md。編集時の要点だけ:
# - 起点 @last-touched は zsh がコマンド実行時にスタンプ。select しただけでは点灯しない (仕様。再提案は棄却してよい)
# - @busy: いずれかの pane の前面コマンドが zsh 以外なら経過に関係なく点灯固定 (*zsh は -zsh も拾う)。
#   tail -f / ssh / claude 等の常駐 window が常時点灯なのは仕様 (見張り=作業扱い)
# - ⚠️ #{T:%s} 直書き不可。@epochfmt 経由 (status-left の @secfmt と同じ罠)
set -g @busy '#{!=:#{P:#{?#{m:*zsh,#{pane_current_command}},,x}},}'
set -g @epochfmt '%s'

# フェード定数 (ここだけ触れば全体へ伝播。`tmux set -g @fade-step-secs 3` でライブ調整→ここへ書き戻す)。
# step × max = 地に溶けるまでの秒数 (現 5×5=25 秒)。
# ⚠️ step は zsh スタンプの throttle (_tmux_window_name.zsh) 以上に保つこと (詳細は fade doc)
set -g @fade-step-secs '5'

# ⚠️ 段数上限 5 は 256色 cube 対角の階調上限 (colour16..201 の 6 段)。5 超は不可、減らすと最明輝度も
# 一緒に下がる (量子化制約)。clamp・消灯 cutoff・ランプ・fg 閾値の全てがこれを参照する単一定数
set -g @fade-bucket-max '5'
set -g @fade-hot-fg 'colour16'    # 明るい段 (bucket 0..max-4 = colour201/164) の文字色: 黒
set -g @fade-dim-fg 'colour252'   # 暗い段 (bucket max-3.. = colour127/90/53。紫は緑成分ゼロで輝度が低い) の文字色: 明るい灰
set -g @fade-cold-fg 'colour240'  # 消灯 (bucket max / 未スタンプ) の文字色
set -g @fade-hot-bg 'colour#{e|+:16,#{e|*:37,#{@fade-bucket-max}}}'  # 最明 (busy / bucket0) = ランプ最上段。@fade-bucket-max から導出

# 経過秒 → 段 (0=最明 .. max=消灯)。負値 (時計ずれ) は 0 に clamp
set -g @fade-bucket '#{?#{e|>:#{e|/:#{e|-:#{T:@epochfmt},#{@last-touched}},#{@fade-step-secs}},#{@fade-bucket-max}},#{@fade-bucket-max},#{?#{e|<:#{e|/:#{e|-:#{T:@epochfmt},#{@last-touched}},#{@fade-step-secs}},0},0,#{e|/:#{e|-:#{T:@epochfmt},#{@last-touched}},#{@fade-step-secs}}}}'

# bg ランプ = cube 対角 colour(16+37*(max-bucket)): bucket0=201 → max-1=53 (黄昏の残光のバイオレット)
set -g @fade-ramp-color 'colour#{e|+:16,#{e|*:37,#{e|-:#{@fade-bucket-max},#{E:@fade-bucket}}}}'

# @fade = bg+fg (セル先頭用) / @fadefg = fg のみ (アイコン後の中間リセット用。bg を再適用すると後段の
# zoom 暗赤を潰すため触らない)
set -g @fade '#{?#{E:@busy},#[bg=#{E:@fade-hot-bg}]#[fg=#{@fade-hot-fg}],#{?@last-touched,#{?#{e|>=:#{E:@fade-bucket},#{@fade-bucket-max}},#[bg=default]#[fg=#{@fade-cold-fg}],#[bg=#{E:@fade-ramp-color}]#[fg=#{?#{e|>=:#{E:@fade-bucket},#{e|-:#{@fade-bucket-max},3}},#{@fade-dim-fg},#{@fade-hot-fg}}]},#[bg=default]#[fg=#{@fade-cold-fg}]}}'
set -g @fadefg '#{?#{E:@busy},#[fg=#{@fade-hot-fg}],#{?@last-touched,#{?#{e|>=:#{E:@fade-bucket},#{@fade-bucket-max}},#[fg=#{@fade-cold-fg}],#[fg=#{?#{e|>=:#{E:@fade-bucket},#{e|-:#{@fade-bucket-max},3}},#{@fade-dim-fg},#{@fade-hot-fg}}]},#[fg=#{@fade-cold-fg}]}}'

# ------------------------------
# window list。各セル = fade 背景 + [ペイン数] + claude 状態アイコン + 名前 15 字切り詰め。
# claude 状態 (@claude_state: pane opt。_claude/hooks/tmux-pane-state.sh が書く) の色/記号はここで
# 単一定義し、current / 非 current 両 format が参照する (seen/else の色だけ window_active で差す)。
# ⚠️ pane-border-format は window_active 非依存の固定色を使うため、あちらは意図的にこの定数を参照しない
set -g @claude-state-fg '#{?#{m:*working*,#{@claude_state}},colour220,#{?#{m:*input*,#{@claude_state}},colour203,#{?#{m:*seen*,#{@claude_state}},#{?window_active,colour250,colour244},#{?window_active,colour123,colour10}}}}'
set -g @claude-state-glyph '#{?#{m:*working*,#{@claude_state}},⚙,#{?#{m:*input*,#{@claude_state}},🔔,#{?#{m:*seen*,#{@claude_state}},🔕,✓}}}'

# 非 current セル。優先順: bell シアン反転 (見るまで残す) > zoom 暗赤 > fade。
# ⚠️ zoom は #{E:@fade} の後に #[bg=colour52] を重ねる (後勝ち)。逆順だと fade bg が zoom を消す。
# ⚠️ bell の反転は format 側で編む (bell-style 単体は既存 #[fg=] に負けて bg しか効かない)。
# (index%6 の虹色分けは検討済み却下: 見にくい)
setw -g window-status-format "#{?window_bell_flag,#[bg=colour51]#[fg=colour16],#{?window_zoomed_flag,#{E:@fade}#[bg=colour52],#{E:@fade}}} #I:#{?#{>:#{window_panes},1},#[fg=colour214][#{window_panes}]#{?window_bell_flag,#[fg=colour16],#{E:@fadefg}} ,}#{?#{!=:#{P:#{?@claude_state,x,}},},#{P:#{?@claude_state,#[fg=#{E:@claude-state-fg}]#{E:@claude-state-glyph},}}#{?window_bell_flag,#[fg=colour16],#{E:@fadefg}} ,}#{=15:window_name} "

# current 島 / zoom の accent (bg にも fg にも使う role 名。テーマ変更手順は docs/theme-colors.md)。
# ⚠️ @cur-accent は nvim 側 bufferline 選択タブ (palette.lua accent.current_accent = #FF5F00/202) と
# 「現在地 = 蛍光オレンジ」を共有する。変えるときは必ず対で
set -g @cur-accent 'colour202'   # 現在地 (current window 島)
set -g @zoom-accent 'colour160'  # zoom 警告赤 (pane-border の 🔍ZOOM ヒントと共有)

# 点火 (ignite): window 切替時に、切替直前の表示色から「沈む → 点火」の V 字で現在地色へ遷移する演出
# (~0.3 秒)。scripts/tmux_ignite_current.sh (下部 hook) が @ignite を最大 8 フレーム駆動し、描画は
# @cur-live (アニメ中=@ignite / 平常=@cur-accent) を参照。テーマ変更は従来どおり @cur-accent だけ触る
set -g @cur-live '#{?@ignite,#{@ignite},#{@cur-accent}}'

# current 島 (三角外側を fade 色で塗る変種 @fadetri* は no-op のまま需要が出ず撤去。再挑戦は島幅 +2 問題に注意)
setw -g window-status-current-format "#{?window_zoomed_flag,#[bg=#{@zoom-accent}]#[fg=colour16],#[bg=#{E:@cur-live}]#[fg=colour16]} #I:#{?#{>:#{window_panes},1},#[fg=colour214][#{window_panes}]#[fg=colour16] ,}#{?#{!=:#{P:#{?@claude_state,x,}},},#{P:#{?@claude_state,#[fg=#{E:@claude-state-fg}]#{E:@claude-state-glyph},}}#[fg=colour16] ,}#{=15:window_name} #[default]"

# セル境界の仕切り棒 (単色赤 ┃)。⚠️ 棒の前後にスペースを入れない: separator はバー地で描かれるため、
# 点灯セルの両脇に灰の隙間が出てブツ切れに見える (セルの余白は format 内側のスペースが担う)。
# (current 両脇だけの色分けは検討済み却下: 島の背景色で判別できるため単色化)
set -g window-status-separator "#[fg=colour196]┃#[default]"
set -g display-time 2000

# メッセージ / : プロンプトの配色。message-command-style は vi command mode に入った時だけ濃紺へ
# 切り替わる (入力モードが色で分かる)。bell 帯もこれ経由なので bell セルのシアンと揃う
set -g message-style 'bg=colour51,fg=colour16,bold'
set -g message-command-style 'bg=colour17,fg=colour51'

# bell 閃光: 別 window の \a で (1) 下端にシアン帯を 800ms (2) セルをシアン反転で「見るまで残す」
# (反転の実体は window-status-format 側の条件)。`sleep 300; printf '\a'` 型の完了通知向け。
# monitor-bell はデフォルト on だが依存を明示
setw -g monitor-bell on
set -g window-status-bell-style 'bg=colour51,fg=colour16'
set-hook -g alert-bell 'display-message -d 800 -N "🔔 BELL: #{window_name}"'

# pane 分割の toast 通知 (bin/tmux-toast: 右下 floating pane、フォーカス非奪取)。
# ⚠️ toast 用の new-pane 自体がこの after-split-window を再発火する (tmux 3.7b 実測)。
# 無限増殖の抑止は tmux-toast 側の再入ガード (@tmux_toast_last_epoch) が担うので、
# hook 側に条件分岐を足さないこと (二重管理になる)
set-hook -g after-split-window 'run-shell -b "\${DOTFILES_DIR:-\$HOME/dotfiles}/bin/tmux-toast \"🪟 pane を分割しました\""'
# pane を閉じた時 (C-d でも kill-pane でも pane-exited が発火する)。
# -e '#{hook_pane}' は「toast 自身の pane 終了」を通知から除外するために必須
# (無いと toast の終了が次の閉じ通知を生み、2 秒周期で永久に出続ける)
set-hook -g pane-exited 'run-shell -b "\${DOTFILES_DIR:-\$HOME/dotfiles}/bin/tmux-toast -e \"#{hook_pane}\" \"🗑 pane を閉じました\""'

# 以下 2 つはデフォルト値だが依存を明示
set -g detach-on-destroy on
set -g alternate-screen on

# 外側ターミナルのウィンドウタイトルにも pane_title を反映
set -g set-titles on
set -g set-titles-string "#{pane_title} — tmux:#S"

# マウス無効 (キーボード前提)。mouse on は Terminal.app のマウスレポート実装が弱く、分割ペインの
# ドラッグ選択で表示が崩れるため撤回済み (tmux#816。tmux 設定では解消不可)。コピーは copy-mode か
# ネイティブ選択で。再燃したら iTerm2 の tmux -CC 統合への移行を先に検討
set -g mouse off

# ------------------------------
# vim 風ペイン移動 (C-h/j/k/l 版は Ctrl 押しっぱなし用。prefix テーブル内のみでシェルの C-h 等に影響なし)。
# ⚠️ 移動系に -r (repeat) を付けない: repeat-time 内にシェルへ打った h/j/k/l が移動に化ける誤爆の実績。
# 連打が欲しいのはリサイズ (下の H/J/K/L) だけ
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind C-h select-pane -L
bind C-j select-pane -D
bind C-k select-pane -U
bind C-l select-pane -R

# vim 風リサイズ (大文字、-r で連打可)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# copy-mode は vi キー
set-window-option -g mode-keys vi

# copy-mode 突入は 3 通り: prefix+[ / prefix+C-[ (端末上 C-[ は Esc と同一バイトなので Escape に bind) /
# M-[ (prefix なし。矢印キー等の \e[ シーケンスと稀に誤爆しうるが速度優先で許容)
bind-key [ copy-mode
bind-key Escape copy-mode
bind-key -n M-[ copy-mode

# Space / v で選択開始、y / Enter で pbcopy して抜ける
bind-key -T copy-mode-vi Space send-keys -X begin-selection
bind-key -T copy-mode-vi v     send-keys -X begin-selection
bind-key -T copy-mode-vi y     send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# copy-mode 配色: 検索の全ヒットは紺地シアン、現在ヒットはシアン地黒 bold、選択は明シアン帯。
# ⚠️ mode-style は choose-tree 等の他 window mode にも効く (copy-mode 専用 selection-style は 3.6+)
set -g mode-style 'bg=colour45,fg=colour16,bold'
set -g copy-mode-match-style 'bg=colour17,fg=colour51'
set -g copy-mode-current-match-style 'bg=colour51,fg=colour16,bold'
set -g copy-mode-mark-style 'bg=colour208,fg=colour16'

# BSpace / Space で window 前後、Tab で直前 window とトグル (claude 窓 ⇄ 作業窓の往復用)
bind-key BSpace previous-window
bind-key Space next-window
bind-key Tab last-window

# Ctrl 押しっぱなしでも効く別名
bind C-c new-window -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind C-n next-window
bind C-p previous-window
# リロードはサーバ起動直後 (continuum 発火窓内) だけ確認を挟む: 窓内のリロードは auto-restore を
# 再発火しうる (KNOWN LIMITATION)。窓外は従来どおり即リロード。閾値の出典はスクリプト冒頭参照
bind R run-shell '${DOTFILES_DIR:-$HOME/dotfiles}/scripts/tmux_reload_confirm.sh #{q:client_name}'

# ペイン分割 (screen 風: v と | = 左右 / s と - = 上下)
bind v split-window -h -c "#{pane_current_path}"
bind \| split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ------------------------------
# ペイン境界。アクティブ枠は fg=bg のベタ塗りで 1 セル幅の発光帯にする (線グリフより太く見せる唯一の
# 手段)。境界セルの bg は塗らない (隣接 pane と半々に混ざる tmux の描画仕様)。現在地は上端 ACTIVE 帯で補う
set -g pane-border-style        fg=colour238

# 枠色はモード連動: copy-mode=黄 / synchronize-panes=赤 (入力が全 pane に飛ぶ誤爆警告) / 通常=緑
set -g pane-active-border-style '#{?pane_in_mode,fg=colour226#,bg=colour226,#{?pane_synchronized,fg=colour196#,bg=colour196,fg=colour46#,bg=colour46}}'

# double = 見かけ上いちばん太い枠線 (ボーダーは 1 セル幅が上限)
set -g pane-border-lines double

# 非アクティブ pane は無彩 234 に沈め、アクティブは terminal 既定 (プロファイルの暖色地) のままにして
# 「暖 vs 無彩」の面の対比で識別する。nvim 等が自前で bg を塗るアプリ内には効かない (素のプロンプトで
# 効く)。差を強めたければ非アクティブを 236 へ
set -g window-style        'fg=colour247,bg=colour234'
set -g window-active-style 'fg=terminal,bg=terminal'
set -g pane-border-indicators both
set -g pane-border-status top

# カーソルは緑の明滅ブロック (アクティブ枠と同色の点光源。アプリが自前設定する場合はそちらが優先)
set -g cursor-style blinking-block
set -g cursor-colour colour46

# スクロールバー off: 3.6a はバー表示中ペインが 1 列 narrow され reflow が起きるため幅の安定を優先。
# ⚠️ pane-scrollbars は 3.6 新設オプション。旧サーバでは "invalid option" になるため版数ガード経由で
# set し、3.6 未満には upgrade 警告を出す。tmux を 3.6+ に統一したらガードを外して素の set に戻してよい
if-shell '${DOTFILES_DIR:-$HOME/dotfiles}/scripts/tmux_version_gte.sh 3 6' \
  'set -g pane-scrollbars off' \
  'display-message "⚠️ tmux server #{version} は古い: pane-scrollbars 無効化中。3.6+ 推奨 (brew upgrade tmux + kill-server)"'

# ペイン上端バー: claude 状態 (色分け) + ACTIVE 帯 (明緑) または灰のペイン情報 + zoom 解除ヒント
set -g pane-border-format " #{?@claude_state,#{?#{m:*working*,#{@claude_state}},#[fg=colour220],#{?#{m:*input*,#{@claude_state}},#[fg=colour203],#{?#{m:*seen*,#{@claude_state}},#[fg=colour244],#[fg=colour10]}}}#{@claude_state}#[default] ,}#{?pane_active,#[fg=colour16#,bg=colour46#,bold] ACTIVE #P: #{s|${HOME}|~|:pane_current_path} (#{pane_current_command}) ,#[fg=colour245] #P: #{s|${HOME}|~|:pane_current_path} (#{pane_current_command}) }#[default]#{?window_zoomed_flag,#[fg=#{@zoom-accent}] 🔍 ZOOM (prefix+z で解除)#[default],} "

# ペイン入れ替え (番号オーバーレイで相手を選ぶ)。swap 手段はこれに一本化 (swapmode / rotate-window /
# swap-pane {} は誤爆事故のため撤去済み。再導入はまず e の不足を言語化すること)。
# ⚠️ -s %% で書く (-t %% 禁止): -t だと marked pane (prefix+m) が居ると常に marked との交換になる罠。
# -d はフォーカスを元の画面位置に残すため
bind e display-panes -d 0 'swap-pane -d -s %%'

# 次ペイン選択 (2 pane なら実質トグル)。C-o は旧 rotate-window の誤爆防止 unbind をやめ、安全な
# select-pane を割り当てて解消。-r なし (移動系の方針どおり)
bind o   select-pane -t :.+
bind C-o select-pane -t :.+
unbind M-o
unbind '{'
unbind '}'

# git popup (g = git): いま見ているペインの cwd の repo の git log TUI。実体は glogx
# (glog の push 機能つき派生版。CI job 表示・diff・PR/ブラウザ導線・b push。src/glogx、
# bin/glogx ラッパーが初回自動ビルド)。-d でペインの cwd 起動 = zsh の window を探さない。
# nvim / claude のペインからでも効く。キーは glogx --help 参照。
# 旧実装の変遷: shell+fzf の scripts/tmux_git_popup.sh → 自作 Go TUI の bin/git-popup
# (どちらも 2026-07-19 に退役。git-popup は glogx へ置き換え。ユーザー指定)。
# 旧 bind g (pane_move get) は不使用とのことで撤去 (give の G は残置)
bind g display-popup -E -d '#{pane_current_path}' -w 90% -h 85% '${DOTFILES_DIR:-$HOME/dotfiles}/bin/glogx'
# prefix なし版 (C-g 一発。ユーザー指定)。⚠️ これにより zshrc の ^G 起点ウィジェット
# (^G^S git_status / ^G^G git_diff / ^g^b ブランチ選択) には tmux 内から到達できなくなる
# (この popup が同用途の上位互換のため許容。戻すならこの行を M-g に変える)。
# popup 内 (Go TUI) では C-g で閉じる (TUI 側が C-g を quit に割当 = トグル風に開閉できる)。
bind -n C-g display-popup -E -d '#{pane_current_path}' -w 90% -h 85% '${DOTFILES_DIR:-$HOME/dotfiles}/bin/glogx'

# window を跨ぐ pane 移動 (fzf popup)。G=give: 現在ペインを選んだ window へ送る
bind G display-popup -E -w 85% -h 70% '${DOTFILES_DIR:-$HOME/dotfiles}/scripts/tmux_fzf_pane_move.sh give'

# 全セッションの window を fzf popup で選んでジャンプ (デフォルト find-window の上位互換)
bind f display-popup -E -w 85% -h 70% '${DOTFILES_DIR:-$HOME/dotfiles}/scripts/tmux_fzf_jump.sh'

# 最後に作業した window へジャンプ (@last-touched の逆引き。現在 window は除外。詳細はスクリプト冒頭)
bind u run-shell '${DOTFILES_DIR:-$HOME/dotfiles}/scripts/tmux_jump_last_touched.sh'

# 画面からの吸い出し (extrakto 型): URL / パス / git ハッシュ / 単語を fzf で選び貼付・コピー・開く。
# ⚠️ popup 内の shell-command では #{...} が展開されない (対象ペインの解決はスクリプト側。kill 系も同じ)
bind y display-popup -E -w 85% -h 70% '${DOTFILES_DIR:-$HOME/dotfiles}/scripts/tmux_extract_popup.sh'
bind C-y display-popup -E -w 85% -h 70% '${DOTFILES_DIR:-$HOME/dotfiles}/scripts/tmux_extract_popup.sh'

# ランチャー (display-menu)。ペインが Claude / nvim で塞がっていてプロンプトに降りられない時の定型
# コマンド実行用。項目追加は「"表示名" キー "コマンド"」を 1 行足す (10 個超えたら fzf 化を検討)。
# 実行先 (専用セッション launcher + 緑枠 popup) は tmux_launcher_run.sh 冒頭参照。
# ⚠️ menu 項目は「menu 表示 + 選択後 run-shell」で format が 2 回展開される。##{q:...} と書いて
# 1 回目を「# への畳み」だけにし、q: 展開を run-shell 側の 1 回に限定する (素の #{q:} は値が化ける。
# 展開 1 回の bind t 等は素の #{q:} でよい)
bind Enter display-menu -T " 🚀 Launcher " \
  "claude update"  u  "run-shell '\${DOTFILES_DIR:-\$HOME/dotfiles}/scripts/tmux_launcher_run.sh ##{q:client_name} ##{q:session_name} ##{q:pane_current_path} claude-up \"claude update\"'" \
  "codex update"   c  "run-shell '\${DOTFILES_DIR:-\$HOME/dotfiles}/scripts/tmux_launcher_run.sh ##{q:client_name} ##{q:session_name} ##{q:pane_current_path} codex-up \"codex update\"'"

# scratch popup トグル (prefix+t / C-t t)。専用セッション scratch をフローティング attach し、popup 内の
# 再押下で detach (セッションと作業状態は生存)。実装・色・不変条件は scripts/tmux_scratch_popup.sh に集約。
# (背後暗転スポットライトは検討済み却下: dim/undim の対称性バグで revert)
bind t run-shell '${DOTFILES_DIR:-$HOME/dotfiles}/scripts/tmux_scratch_popup.sh #{q:client_name} #{q:session_name}'
bind C-t run-shell '${DOTFILES_DIR:-$HOME/dotfiles}/scripts/tmux_scratch_popup.sh #{q:client_name} #{q:session_name}'

# フォーク Claude 会話の popup トグル (prefix+b)。scratch のミラー。⚠️ 2026-06 のサーバ消滅事件の A/B
# 観測のため無効化中 (真因は孤児サーバ複合と判明済み・popup の因果は未観測)。経緯・設計・復活手順は
# docs/claude-fork-popup.md
# bind b if-shell -F '#{==:#{session_name},claude-fork}' "detach-client" "display-popup -E -w 80% -h 75% -b heavy -S fg=colour48,bg=colour22,bold -s bg=colour234 -T '#[fg=colour231] 🌿 FORK — claude --fork-session (C-t b で閉じる) ' '\${DOTFILES_DIR:-\$HOME/dotfiles}/scripts/tmux_fork_popup.sh'"

# kill 系は誤爆防止で popup + gum confirm を挟む (実例: C-t q 誤爆で実行中 claude ごと他ペイン全 kill)。
# 確認ロジックは scripts/tmux_kill_confirm.sh に集約。枠色 = 危険度 (x=現ペインのみ黄 / q=他全ペイン赤 /
# &=window 全体赤)。& は素の confirm-before (y 一打で通る) から gum 統一へ差し替え
bind x display-popup -E -w 60 -h 8 -b rounded -S "fg=yellow" -T " ペイン kill 確認 " '${DOTFILES_DIR:-$HOME/dotfiles}/scripts/tmux_kill_confirm.sh pane'
bind q display-popup -E -w 60 -h 8 -b rounded -S "fg=red" -T " 全ペイン kill 確認 " '${DOTFILES_DIR:-$HOME/dotfiles}/scripts/tmux_kill_confirm.sh others'
bind & display-popup -E -w 60 -h 8 -b rounded -S "fg=red" -T " window kill 確認 " '${DOTFILES_DIR:-$HOME/dotfiles}/scripts/tmux_kill_confirm.sh window'

# スクロールバックの即時解放 (メモリを返す唯一の手段: history-limit 変更は既存ペインに遡及しない)。
# 全ペインが対象で破壊的なので kill 系と同じ confirm。gum 未導入なら && 短絡で何もしない
bind M-c display-popup -E -w 64 -h 8 -b rounded -S "fg=yellow" -T " history 解放確認 " \
  'gum confirm --default=false --affirmative "解放する" --negative "やめる" "全ペインのスクロールバックを解放してメモリを返す？" && tmux list-panes -a -F "#{pane_id}" | xargs -n1 tmux clear-history -t'

# prefix なしの window / pane 移動 (Alt)。ペイン移動は端に居るときは何もしない (ラップ防止)
bind -n M-p previous-window
bind -n M-n next-window
bind -n M-h if-shell -F '#{?pane_at_left,0,1}'   'select-pane -L'
bind -n M-j if-shell -F '#{?pane_at_bottom,0,1}' 'select-pane -D'
bind -n M-k if-shell -F '#{?pane_at_top,0,1}'    'select-pane -U'
bind -n M-l if-shell -F '#{?pane_at_right,0,1}'  'select-pane -R'

# ------------------------------
# tmux plugins (vendored。手動インストール不要)。永続化の全体像・トラブルシューティングは
# docs/tmux-plugins.md
set -g @continuum-restore 'on'

# 自動復元の発火窓 10→60 秒: 外部 (Claude/IDE) 起動だと conf source が 10 秒を超え silent に復元不発に
# なるため (Gate1)。もう一方の Gate2 (孤児サーバ検知で恒久 skip。17 日間不発の実例あり) の対策は
# 孤児予防 + tt 起動時 reap。経緯と KNOWN LIMITATION (起動 60 秒以内の bind R が restore を再発火しうる)
# は docs/tmux-plugins.md のトラブルシューティング参照
set -g @continuum-restore-max-delay '60'

# [観測] conf source ごとに Gate2 の入力 (tmux_procs=) と last の実体を記録。continuum の skip は完全に
# silent のため、次の復元不発を ~/.cache/tt-restore-trigger.log で後追いできるようにする
run-shell -b '{ mkdir -p "$HOME/.cache" && printf "%s\tconf-source tmux_procs=%s last=%s\n" "$(date +%FT%T)" "$(ps -u $(id -u) -o command | grep "^tmux" | grep -cv "^tmux source")" "$(readlink "${XDG_DATA_HOME:-$HOME/.local/share}/tmux/resurrect/last" 2>/dev/null)" >> "$HOME/.cache/tt-restore-trigger.log"; } 2>/dev/null || true'

# ペイン内容 (スクロールバック) も保存・復元
set -g @resurrect-capture-pane-contents 'on'

# 復元進行フラグ (@tt-restore-*。役割は docs/tmux-plugins.md「復元進行フラグ」)。
# ⚠️ 不変条件: pre で complete/duration を明示クリア → post で duration を先・complete=1 を最後に立てる。
# 崩すと tt が復元途中に attach する / 古い duration を flash する。in-progress の値が epoch なのは
# 途中クラッシュ時に保存側が TTL で自己回復するためと、post が所要秒を算出するため
set -g @resurrect-hook-pre-restore-all 'tmux set-option -gu @tt-restore-complete; tmux set-option -gu @tt-restore-duration; tmux set-option -g @tt-restore-in-progress $(date +%s)'
set -g @resurrect-hook-post-restore-all 'tt_s=$(tmux show -gqv @tt-restore-in-progress); tt_d=$(( $(date +%s) - ${tt_s:-0} )); tmux set-option -g @tt-restore-duration "$tt_d"; { mkdir -p "$HOME/.cache" && printf "%s\trestore=%ss\n" "$(date +%FT%T)" "$tt_d" >> "$HOME/.cache/tt-restore-duration.log"; } 2>/dev/null; tmux set-option -g @tt-restore-in-progress 0; tmux set-option -g @tt-restore-complete 1'

# window / pane の構成変化で resurrect 保存を debounce 発火 (15 分周期だけだと直近の変化が再起動で
# 消える)。復元中ガード・lock・debounce token はスクリプト側に集約。
# ⚠️ command-alias は parse 時に展開されるため set-hook より前に定義が必要。サーバ全体の索引付き配列
# (index 100 は未使用を確認済み)
set -s command-alias[100] debounce-save="run-shell -b '\${DOTFILES_DIR:-\$HOME/dotfiles}/scripts/tmux_resurrect_debounced_save.sh'"
set-hook -g window-linked   debounce-save
set-hook -g window-unlinked debounce-save

# ⚠️ after-kill-pane (明示 kill) と pane-exited (プロセス終了) は両方必要 (片方だけでは発火しない。実測)。
# pane-* hook は show-hooks -g に表示されないが発火する (表示有無で有効性を判断しないこと)
set-hook -g after-split-window debounce-save
set-hook -g after-kill-pane    debounce-save
set-hook -g pane-exited        debounce-save

# window を見たら配下の 🔔 input を 🔕 seen (既読) に降格。応答すると hook が working に上書きする一時状態
set-hook -g after-select-window "run-shell -b '\${DOTFILES_DIR:-\$HOME/dotfiles}/_claude/hooks/tmux-mark-seen.sh #{window_id}'"

# 点火演出 (上部 @cur-live 参照)。[1] = mark-seen ([0]) と共存する indexed hook。client-session-changed は
# switch-client での session 跨ぎ (window 選択を伴わない) を拾う。引数 = 切替直前にそのセルが表示して
# いた色 (fire 時に window 文脈で展開。消灯は式が colour16 を返す)
set-hook -g "after-select-window[1]" "run-shell -b '\${DOTFILES_DIR:-\$HOME/dotfiles}/scripts/tmux_ignite_current.sh #{?#{E:@busy},#{E:@fade-hot-bg},#{E:@fade-ramp-color}}'"
set-hook -g client-session-changed "run-shell -b '\${DOTFILES_DIR:-\$HOME/dotfiles}/scripts/tmux_ignite_current.sh #{?#{E:@busy},#{E:@fade-hot-bg},#{E:@fade-ramp-color}}'"

# [観測] session close ごとに残セッション数を記録 (サーバ突然 exit の切り分け用: remaining=0 の正常
# exit-empty か、外因かを後追いできるようにする)
set-hook -g session-closed "run-shell -b '\${DOTFILES_DIR:-\$HOME/dotfiles}/scripts/tmux_log_session_closed.sh'"

# ロード順: continuum は resurrect に依存
run-shell 'f="${DOTFILES_DIR:-$HOME/dotfiles}/vendor/tmux-plugins/tmux-resurrect/resurrect.tmux"; [ -f "$f" ] && bash "$f"'
run-shell 'f="${DOTFILES_DIR:-$HOME/dotfiles}/vendor/tmux-plugins/tmux-continuum/continuum.tmux"; [ -f "$f" ] && bash "$f"'

# copy-mode スクロールアニメ (vendor tmux-smooth-scroll + local patch。VERSIONS.txt)。C-u/C-d/C-b/C-f を
# ease 付き段階スクロールに置換。連打・アニメ中の再押下は即時ジャンプへ素通し。
# ⚠️ 読み込みは copy-mode-vi の自前 bind より後 (init.sh が list-keys を走査して re-bind する。conf 末尾で充足)。
# マウスは対象外 (元々逐次イベントで実質スムーズ)。normal スコープも対象外 (C-e/y の 1 行の意味が変わる)。
# 他の調整ノブ (speed / easing / repeat-ms) は vendor README 参照
set -g @smooth-scroll-mouse 'false'
set -g @smooth-scroll-scopes 'halfpage fullpage'

# 行ごとの全 pane 再描画は Apple Terminal に重いため chunk 化 (easing の時間配分は保存される)。0 = 行ごと
set -g @smooth-scroll-max-steps '10'
run-shell 'f="${DOTFILES_DIR:-$HOME/dotfiles}/vendor/tmux-plugins/tmux-smooth-scroll/smooth-scroll.tmux"; [ -f "$f" ] && bash "$f"'

# 保存経路の直列化: continuum 周期 / debounce / 手動保存が同時に走ると save/ を壊し合うため、単一 lock の
# wrapper に全経路を集約する (詳細は docs/tmux-plugins.md)。
# ⚠️ resurrect.tmux が load 時に本オプションを vendored save.sh へ上書きするため、必ず load 後 (この位置)
# で上書きする (run-shell 非 -b は同期実行なので順序が保たれる)
run-shell 'tmux set-option -g @resurrect-save-script-path "${DOTFILES_DIR:-$HOME/dotfiles}/scripts/tmux_resurrect_save.sh"'

# 手動保存 C-s も wrapper へ貼り替え (resurrect の set_save_bindings は C-s に vendored save.sh を直接
# パスで bind し @resurrect-save-script-path を経由しない。これが無いと手動保存だけ lock を素通りする)
bind-key C-s run-shell '${DOTFILES_DIR:-$HOME/dotfiles}/scripts/tmux_resurrect_save.sh'

# 手動復元 C-r は kill 系と同じ確認 popup 経由へ貼り替え (誤爆の再現条件と経緯はスクリプト冒頭参照)。
# resurrect が load 時に C-r を素の restore.sh へ bind するため、この貼り替えも必ず load 後に置く
bind-key C-r display-popup -E -w 64 -h 8 -b rounded -S "fg=yellow" -T " tmux 復元確認 " '${DOTFILES_DIR:-$HOME/dotfiles}/scripts/tmux_restore_confirm.sh'
